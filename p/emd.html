<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Aemangsieve — TagCanvas Stable</title>
  <style>
    :root {
      --bg0: #05030b;
      --bg1: #100923;
      --bg2: #1d113a;
      --text: #f4edff;
      --muted: #bcaee3;
      --cyan: #8feaff;
      --glass: rgba(10, 7, 24, .58);
      --line: rgba(255,255,255,.16);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 58%, rgba(106, 74, 218, .22), transparent 24%),
        radial-gradient(circle at 50% 50%, var(--bg2), var(--bg1) 42%, var(--bg0) 82%);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    }

    body::before {
      content: "";
      position: fixed;
      inset: -12%;
      pointer-events: none;
      background-image:
        radial-gradient(circle, rgba(255,255,255,.45) 0 1px, transparent 1.4px),
        radial-gradient(circle, rgba(147,120,255,.22) 0 1px, transparent 1.5px);
      background-size: 92px 92px, 151px 151px;
      background-position: 0 0, 42px 64px;
      opacity: .22;
    }

    .app {
      position: relative;
      width: 100vw;
      height: 100dvh;
      min-height: 100vh;
      display: grid;
      place-items: center;
    }

    .title {
      position: fixed;
      top: max(28px, env(safe-area-inset-top));
      left: max(32px, env(safe-area-inset-left));
      z-index: 10;
      max-width: 360px;
      pointer-events: none;
    }

    .title h1 {
      margin: 0 0 8px;
      font-size: clamp(38px, 5vw, 76px);
      line-height: .86;
      letter-spacing: -.075em;
      text-shadow: 0 0 28px rgba(180, 145, 255, .38);
    }

    .title p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
      font-size: 14px;
    }

    .canvas-wrap {
      position: relative;
      width: min(86vmin, 780px);
      height: min(86vmin, 780px);
      display: grid;
      place-items: center;
    }

    #ideaCanvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: pointer;
      touch-action: none;
    }

    #ideaTags {
      display: none;
    }

    #ideaTags a {
      font-size: 18px;
      color: #efe8ff;
      text-decoration: none;
    }

    .input-dock {
      position: fixed;
      right: max(28px, env(safe-area-inset-right));
      top: max(28px, env(safe-area-inset-top));
      z-index: 20;
      width: min(370px, calc(100vw - 56px));
      padding: 10px;
      border-radius: 999px;
      background: var(--glass);
      border: 1px solid var(--line);
      backdrop-filter: blur(16px);
      display: flex;
      gap: 8px;
      box-shadow: 0 18px 70px rgba(0,0,0,.26);
    }

    .input-dock input {
      min-width: 0;
      flex: 1;
      border: 0;
      outline: 0;
      color: white;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 999px;
      padding: 12px 14px;
      font: inherit;
    }

    .input-dock input::placeholder { color: rgba(245,238,255,.44); }

    .input-dock button {
      border: 0;
      border-radius: 999px;
      padding: 0 15px;
      color: #110925;
      background: linear-gradient(135deg, #f4edff, #aeeaff);
      font-weight: 900;
      cursor: pointer;
    }

    .panel {
      position: fixed;
      left: 50%;
      bottom: max(34px, env(safe-area-inset-bottom));
      transform: translateX(-50%);
      z-index: 15;
      width: min(620px, calc(100vw - 40px));
      padding: 16px 18px;
      border-radius: 24px;
      background: rgba(10, 7, 24, .60);
      border: 1px solid var(--line);
      box-shadow: 0 24px 90px rgba(0,0,0,.34);
      backdrop-filter: blur(16px);
      opacity: 0;
      translate: 0 14px;
      pointer-events: none;
      transition: opacity .2s ease, translate .2s ease;
    }

    .panel.show {
      opacity: 1;
      translate: 0 0;
    }

    .panel .eyebrow {
      color: var(--cyan);
      font-size: 12px;
      letter-spacing: .16em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .panel .selected {
      font-size: clamp(22px, 3.2vw, 36px);
      line-height: 1.15;
      letter-spacing: -.06em;
      font-weight: 800;
    }

    .panel .desc {
      margin-top: 8px;
      color: rgba(245,238,255,.70);
      line-height: 1.5;
      font-size: 14px;
    }

    .detail-modal {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: grid;
      place-items: center;
      padding: 28px;
      background:
        radial-gradient(circle at 50% 50%, rgba(116,89,210,.18), transparent 34%),
        rgba(3,2,9,.72);
      backdrop-filter: blur(10px);
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease;
    }

    .detail-modal.show {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-card {
      width: min(680px, calc(100vw - 40px));
      max-height: min(74vh, 720px);
      overflow: auto;
      border-radius: 30px;
      padding: 26px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.13), rgba(255,255,255,.06)),
        rgba(12,8,30,.90);
      border: 1px solid rgba(255,255,255,.20);
      box-shadow:
        0 30px 120px rgba(0,0,0,.58),
        0 0 70px rgba(159,108,255,.22);
    }

    .modal-top {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: flex-start;
      margin-bottom: 16px;
    }

    .modal-kicker {
      color: var(--cyan);
      font-size: 12px;
      letter-spacing: .16em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .modal-title {
      margin: 0;
      font-size: clamp(26px, 4vw, 46px);
      letter-spacing: -.065em;
      line-height: 1.05;
    }

    .modal-close {
      flex: 0 0 auto;
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(255,255,255,.08);
      color: white;
      width: 38px;
      height: 38px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 20px;
    }

    .modal-body {
      color: rgba(246,240,255,.82);
      line-height: 1.72;
      font-size: 15px;
      white-space: pre-wrap;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 22px;
    }

    .modal-actions button {
      border: 0;
      border-radius: 999px;
      padding: 11px 15px;
      cursor: pointer;
      font-weight: 900;
    }

    .ghost-button {
      color: white;
      background: rgba(255,255,255,.09);
      border: 1px solid rgba(255,255,255,.14) !important;
    }

    .primary-button {
      color: #110925;
      background: linear-gradient(135deg,#f4edff,#aeeaff);
    }

    .status {
      position: fixed;
      right: max(28px, env(safe-area-inset-right));
      bottom: max(28px, env(safe-area-inset-bottom));
      z-index: 12;
      padding: 10px 13px;
      color: rgba(245,238,255,.62);
      border: 1px solid var(--line);
      background: rgba(10,7,24,.42);
      border-radius: 999px;
      font-size: 12px;
      backdrop-filter: blur(14px);
    }

    @media (max-width: 760px) {
      .title {
        top: max(18px, env(safe-area-inset-top));
        left: 18px;
        max-width: 230px;
      }

      .title h1 { font-size: 42px; }
      .title p { font-size: 12px; }

      .canvas-wrap {
        width: 100vmin;
        height: 100vmin;
        margin-top: -7vh;
      }

      .input-dock {
        left: 14px;
        right: 14px;
        top: auto;
        bottom: calc(94px + env(safe-area-inset-bottom));
        width: auto;
        backdrop-filter: none;
      }

      .panel {
        bottom: calc(160px + env(safe-area-inset-bottom));
        backdrop-filter: none;
      }

      .status { display: none; }
      .detail-modal { backdrop-filter: none; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="title">
      <h1>방구냐<br />똥이냐</h1>
      <p>생각나면 뭐가 됬든 저장하라.</p>
    </section>

    <section class="canvas-wrap" id="canvasWrap">
      <canvas id="ideaCanvas" width="760" height="760">
        현재 브라우저는 canvas를 지원하지 않습니다.
      </canvas>

      <div id="ideaTags">
        <ul id="ideaList"></ul>
      </div>
    </section>

    <form class="input-dock" id="ideaForm">
      <input id="ideaInput" autocomplete="off" placeholder="새 기억 제목 입력" />
      <button type="submit">drop</button>
    </form>

    <section class="panel" id="panel">
      <div class="eyebrow">selected memory</div>
      <div class="selected" id="selectedText">기억 저장소</div>
      <div class="desc">태그를 클릭하면 즉시 선택한 기억의 상세 내용을 엽니다. 마우스를 올리면 회전이 감속됩니다.</div>
    </section>

    <section class="detail-modal" id="detailModal" aria-hidden="true">
      <article class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal-top">
          <div>
            <div class="modal-kicker">memory detail</div>
            <h2 class="modal-title" id="modalTitle">기억 제목</h2>
          </div>
          <button class="modal-close" id="modalClose" type="button" aria-label="닫기">×</button>
        </div>
        <div class="modal-body" id="modalBody"></div>
        <div class="modal-actions">
          <button class="ghost-button" id="modalOpenPage" type="button">새 창에서 보기</button>
          <button class="primary-button" id="modalDone" type="button">우물로 돌아가기</button>
        </div>
      </article>
    </section>

    <div class="status" id="status">loading API...</div>
  </main>

  <script src="https://www.goat1000.com/tagcanvas.min.js"></script>
  <script>
    (() => {
      const API_URL = "https://mrdindoin.ddns.net/jsonhub/api/json/localflow/emd";

      const canvas = document.getElementById("ideaCanvas");
      const wrap = document.getElementById("canvasWrap");
      const list = document.getElementById("ideaList");
      const form = document.getElementById("ideaForm");
      const input = document.getElementById("ideaInput");
      const panel = document.getElementById("panel");
      const selectedText = document.getElementById("selectedText");
      const detailModal = document.getElementById("detailModal");
      const modalTitle = document.getElementById("modalTitle");
      const modalBody = document.getElementById("modalBody");
      const modalClose = document.getElementById("modalClose");
      const modalDone = document.getElementById("modalDone");
      const modalOpenPage = document.getElementById("modalOpenPage");
      const status = document.getElementById("status");

      const isMobile = matchMedia("(max-width: 760px)").matches;

      // TagCanvas는 실제 DOM 링크의 href를 따라가는 방식으로 클릭을 처리한다.
      // 그래서 hidden anchor의 onclick만 믿지 않고, javascript: href에서도 접근 가능한
      // 전역 선택 함수를 열어둔다.
      window.__aemangsieveSelect = function(index) {
        selectMemory(Number(index), true);
        return false;
      };

      let data = [];
      let rawStore = null;

      const fallbackData = [
        {
          title: "비밀번호 대신 기억 조각으로 로그인",
          detail: "정답 문자열이 아니라 사용자의 기억 조각을 조합해서 인증하는 UX. 보안 기능이라기보다 시적이고 개인적인 온보딩 경험에 가깝다.",
          openMode: "modal"
        },
        {
          title: "하루 끝에 남는 단어 하나",
          detail: "매일 긴 일기를 쓰게 하지 말고, 하루가 끝났을 때 머릿속에 끝까지 남은 단어 하나만 저장하게 한다.",
          openMode: "modal"
        },
        {
          title: "혼잣말을 저장하는 작은 우물",
          detail: "메모는 너무 생산성 도구 같고, 일기는 너무 부담스럽다. 그 사이 어딘가에 있는 저장소. 사용자는 완성된 문장을 쓰지 않아도 된다.\n\n우물은 정리하지 않는다. 다만 가라앉히고, 보존하고, 언젠가 다시 떠오르게 한다.\n\n이 서비스의 핵심은 검색이 아니라 회상이다.",
          openMode: "page"
        }
      ];

      function setCanvasSize() {
        const rect = wrap.getBoundingClientRect();
        const size = Math.max(320, Math.floor(Math.min(rect.width, rect.height)));
        canvas.width = size;
        canvas.height = size;
      }

      function firstText(...values) {
        for (const value of values) {
          if (typeof value === "string" && value.trim()) return value.trim();
          if (typeof value === "number") return String(value);
        }
        return "";
      }

      function normalizeItem(item, index) {
        if (typeof item === "string") {
          return {
            id: "item-" + index,
            title: item,
            detail: "",
            openMode: "modal"
          };
        }

        if (!item || typeof item !== "object") {
          return {
            id: "item-" + index,
            title: "제목 없는 기억",
            detail: "",
            openMode: "modal"
          };
        }

        const title = firstText(
          item.title,
          item.name,
          item.label,
          item.text,
          item.keyword,
          item.subject,
          item.summary,
          item.content
        ) || "제목 없는 기억";

        const detail = firstText(
          item.detail,
          item.description,
          item.body,
          item.memo,
          item.content,
          item.note,
          item.notes,
          item.value
        );

        return {
          ...item,
          id: item.id || item.uuid || item.key || "item-" + index,
          title,
          detail,
          openMode: item.openMode || item.open_mode || item.mode || "auto",
          url: item.url || item.link || item.href || null,
          createdAt: item.createdAt || item.created_at || item.date || null
        };
      }

      function extractItems(payload) {
        rawStore = payload;

        if (Array.isArray(payload)) return payload;

        if (!payload || typeof payload !== "object") return [];

        if (Array.isArray(payload.items)) return payload.items;
        if (Array.isArray(payload.data)) return payload.data;
        if (Array.isArray(payload.memories)) return payload.memories;
        if (Array.isArray(payload.ideas)) return payload.ideas;
        if (Array.isArray(payload.nodes)) return payload.nodes;
        if (Array.isArray(payload.list)) return payload.list;

        // object map 형태도 지원:
        // { "id1": { title: "..."} , "id2": {...} }
        const entries = Object.entries(payload)
          .filter(([key, value]) => key !== "_meta" && value && typeof value === "object");

        if (entries.length) {
          return entries.map(([key, value]) => ({
            id: key,
            ...value
          }));
        }

        return [];
      }

      async function loadIdeas() {
        status.textContent = "API에서 기억을 불러오는 중...";

        try {
          const response = await fetch(API_URL, {
            method: "GET",
            headers: {
              "Accept": "application/json"
            },
            cache: "no-store"
          });

          if (!response.ok) {
            throw new Error("GET " + response.status);
          }

          const payload = await response.json();
          const items = extractItems(payload);
          data = items.map(normalizeItem).filter(item => item.title);

          if (!data.length) {
            data = fallbackData.map(normalizeItem);
            status.textContent = "API 데이터가 비어 있어 예시 데이터를 표시 중";
          } else {
            status.textContent = "API 연결됨 · " + data.length + " memories";
          }

          startTagCanvas();
        } catch (error) {
          console.error(error);
          data = fallbackData.map(normalizeItem);
          status.textContent = "API 로드 실패 · 예시 데이터 표시 중";
          startTagCanvas();
        }
      }

      function buildSavePayload() {
        // 서버 코드가 list를 POST하면 { items: list, _meta } 형태로 감싸므로,
        // 여기서는 명시적으로 { items } 형태를 유지한다.
        if (rawStore && !Array.isArray(rawStore) && typeof rawStore === "object") {
          return {
            ...rawStore,
            items: data,
            _meta: rawStore._meta || {}
          };
        }

        return {
          items: data
        };
      }

      async function saveIdeas() {
        try {
          const response = await fetch(API_URL, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "Accept": "application/json"
            },
            body: JSON.stringify(buildSavePayload())
          });

          if (!response.ok) {
            throw new Error("POST " + response.status);
          }

          rawStore = await response.json().catch(() => buildSavePayload());
          status.textContent = "저장됨 · " + data.length + " memories";
          return true;
        } catch (error) {
          console.error(error);
          status.textContent = "저장 실패 · 화면에만 추가됨";
          return false;
        }
      }

      function buildTagList() {
        list.innerHTML = "";

        data.forEach((item, index) => {
          const li = document.createElement("li");
          const a = document.createElement("a");

          a.href = "javascript:window.__aemangsieveSelect(" + index + ")";
          a.textContent = item.title;
          a.setAttribute("data-index", String(index));
          a.style.fontSize = isMobile ? "16px" : "20px";
          a.style.color = "#efe8ff";
          a.onclick = function (event) {
            if (event) event.preventDefault();
            selectMemory(index, true);
            return false;
          };

          li.appendChild(a);
          list.appendChild(li);
        });
      }

      function startTagCanvas() {
        setCanvasSize();
        buildTagList();

        if (!window.TagCanvas) {
          status.textContent = "TagCanvas CDN 로드 실패";
          return;
        }

        try {
          try { TagCanvas.Delete("ideaCanvas"); } catch (_) {}

          const ok = TagCanvas.Start("ideaCanvas", "ideaTags", {
            textColour: "#efe8ff",
            textHeight: isMobile ? 16 : 21,
            textFont: "Arial, Helvetica, sans-serif",

            outlineMethod: "block",
            outlineColour: "#ffffff",
            outlineThickness: 1,
            outlineOffset: 6,

            shadow: isMobile ? null : "#a582ff",
            shadowBlur: isMobile ? 0 : 4,
            shadowOffset: [0, 0],

            reverse: true,
            depth: 0.85,
            maxSpeed: isMobile ? 0.03 : 0.05,
            minSpeed: 0.005,
            initial: [0.08, -0.04],
            decel: 0.96,

            dragControl: true,
            dragThreshold: 4,
            wheelZoom: false,

            freezeActive: true,
            freezeDecel: true,
            activeCursor: "pointer",
            // clickToFront를 켜면 첫 클릭이 "앞으로 이동"에 소비되어
            // 상세 모달이 바로 열리지 않는 경우가 있다. 클릭 UX 우선.
            clickToFront: false,
            frontSelect: false,

            fadeIn: 500,
            interval: isMobile ? 35 : 20,
            noSelect: true,
            pinchZoom: false
          });

          if (!ok) {
            status.textContent = "TagCanvas 시작 실패: 태그 목록 또는 캔버스 인식 실패";
          }
        } catch (error) {
          status.textContent = "TagCanvas 오류: " + error.message;
        }
      }

      function selectMemory(index, openDetail) {
        const item = data[index];
        if (!item) return;

        selectedText.textContent = item.title;
        panel.classList.add("show");

        if (openDetail) {
          setTimeout(() => openMemory(item), 260);
        }
      }

      function shouldOpenAsPage(item) {
        if (item.url) return true;
        if (item.openMode === "page") return true;
        if (item.openMode === "modal") return false;
        return (item.detail || "").length > 220;
      }

      function openMemory(item) {
        if (shouldOpenAsPage(item)) openDetailPage(item);
        else openDetailModal(item);
      }

      function openDetailModal(item) {
        modalTitle.textContent = item.title;
        modalBody.textContent = item.detail || "상세 내용이 없습니다.";
        modalOpenPage.onclick = () => openDetailPage(item);
        detailModal.classList.add("show");
        detailModal.setAttribute("aria-hidden", "false");
      }

      function closeDetailModal() {
        detailModal.classList.remove("show");
        detailModal.setAttribute("aria-hidden", "true");
      }

      function escapeHTML(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function openDetailPage(item) {
        if (item.url) {
          window.open(item.url, "_blank", "noopener,noreferrer");
          return;
        }

        const title = escapeHTML(item.title);
        const detail = escapeHTML(item.detail || "상세 내용이 없습니다.").replaceAll("\n", "<br />");
        const page = `<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>${title} — Aemangsieve</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: #f6f0ff;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;

      form.addEventListener("submit", async (event) => {

        const item = {
          id: "emd-" + Date.now(),
          title: text,
          detail: "방금 떨어뜨린 새 기억입니다. 여기에는 상세 메모, 참고 링크, 다음에 할 일 등을 붙일 수 있습니다.",

          createdAt: new Date().toISOString()

        startTagCanvas();
        selectMemory(data.length - 1, false);

      });

      let resizeTimer = null;

        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(startTagCanvas, 180);
