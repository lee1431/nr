
<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Aemangsieve — TagCanvas Stable</title>
  <style>
    :root {
      --bg0: #05030b;
      --bg1: #100923;
      --bg2: #1d113a;
      --text: #f4edff;
      --muted: #bcaee3;
      --cyan: #8feaff;
      --glass: rgba(10, 7, 24, .58);
      --line: rgba(255,255,255,.16);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 58%, rgba(106, 74, 218, .22), transparent 24%),
        radial-gradient(circle at 50% 50%, var(--bg2), var(--bg1) 42%, var(--bg0) 82%);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    }

    body::before {
      content: "";
      position: fixed;
      inset: -12%;
      pointer-events: none;
      background-image:
        radial-gradient(circle, rgba(255,255,255,.45) 0 1px, transparent 1.4px),
        radial-gradient(circle, rgba(147,120,255,.22) 0 1px, transparent 1.5px);
      background-size: 92px 92px, 151px 151px;
      background-position: 0 0, 42px 64px;
      opacity: .22;
    }

    .app {
      position: relative;
      width: 100vw;
      height: 100dvh;
      min-height: 100vh;
      display: grid;
      place-items: center;
    }

    .title {
      position: fixed;
      top: max(28px, env(safe-area-inset-top));
      left: max(32px, env(safe-area-inset-left));
      z-index: 10;
      max-width: 360px;
      pointer-events: none;
    }

    .title h1 {
      margin: 0 0 8px;
      font-size: clamp(38px, 5vw, 76px);
      line-height: .86;
      letter-spacing: -.075em;
      text-shadow: 0 0 28px rgba(180, 145, 255, .38);
    }

    .title p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
      font-size: 14px;
    }

    .canvas-wrap {
      position: relative;
      width: min(86vmin, 780px);
      height: min(86vmin, 780px);
      display: grid;
      place-items: center;
    }

    #ideaCanvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: pointer;
      touch-action: none;
    }

    .well {
      position: absolute;
      left: 50%;
      top: 50%;
      width: min(25vmin, 210px);
      height: min(25vmin, 210px);
      transform: translate(-50%, -50%);
      border-radius: 50%;
      pointer-events: none;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 50% 42%, rgba(234,247,255,.55), rgba(151,127,255,.22) 24%, rgba(33,18,66,.74) 54%, rgba(5,3,12,.94) 76%),
        conic-gradient(from 120deg, rgba(155,221,255,.18), rgba(174,129,255,.32), rgba(255,255,255,.12), rgba(113,226,255,.18), rgba(155,221,255,.18));
      border: 1px solid rgba(255,255,255,.30);
      box-shadow:
        0 0 32px rgba(171,141,255,.58),
        0 0 92px rgba(103,224,255,.18),
        inset 0 0 32px rgba(255,255,255,.18),
        inset 0 -28px 52px rgba(7,4,18,.88);
      overflow: hidden;
      z-index: 2;
    }

    .well::before {
      content: "";
      position: absolute;
      inset: 12%;
      border-radius: 50%;
      background:
        repeating-radial-gradient(circle, rgba(255,255,255,.16) 0 1px, transparent 2px 11px),
        radial-gradient(circle, rgba(156,221,255,.24), transparent 68%);
      opacity: .82;
    }

    .well-label {
      position: relative;
      z-index: 3;
      text-align: center;
      color: rgba(250,246,255,.92);
      font-size: clamp(12px, 1.6vmin, 16px);
      line-height: 1.4;
      letter-spacing: -.03em;
      text-shadow: 0 0 18px rgba(255,255,255,.42);
    }

    .well-label strong {
      display: block;
      font-size: clamp(22px, 3vmin, 32px);
      margin-bottom: 4px;
      letter-spacing: -.055em;
    }

    #ideaTags {
      display: none;
    }

    #ideaTags a {
      font-size: 18px;
      color: #efe8ff;
      text-decoration: none;
    }

    .input-dock {
      position: fixed;
      right: max(28px, env(safe-area-inset-right));
      top: max(28px, env(safe-area-inset-top));
      z-index: 20;
      width: min(370px, calc(100vw - 56px));
      padding: 10px;
      border-radius: 999px;
      background: var(--glass);
      border: 1px solid var(--line);
      backdrop-filter: blur(16px);
      display: flex;
      gap: 8px;
      box-shadow: 0 18px 70px rgba(0,0,0,.26);
    }

    .input-dock input {
      min-width: 0;
      flex: 1;
      border: 0;
      outline: 0;
      color: white;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 999px;
      padding: 12px 14px;
      font: inherit;
    }

    .input-dock input::placeholder { color: rgba(245,238,255,.44); }

    .input-dock button {
      border: 0;
      border-radius: 999px;
      padding: 0 15px;
      color: #110925;
      background: linear-gradient(135deg, #f4edff, #aeeaff);
      font-weight: 900;
      cursor: pointer;
    }

    .panel {
      position: fixed;
      left: 50%;
      bottom: max(34px, env(safe-area-inset-bottom));
      transform: translateX(-50%);
      z-index: 15;
      width: min(620px, calc(100vw - 40px));
      padding: 16px 18px;
      border-radius: 24px;
      background: rgba(10, 7, 24, .60);
      border: 1px solid var(--line);
      box-shadow: 0 24px 90px rgba(0,0,0,.34);
      backdrop-filter: blur(16px);
      opacity: 0;
      translate: 0 14px;
      pointer-events: none;
      transition: opacity .2s ease, translate .2s ease;
    }

    .panel.show {
      opacity: 1;
      translate: 0 0;
    }

    .panel .eyebrow {
      color: var(--cyan);
      font-size: 12px;
      letter-spacing: .16em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .panel .selected {
      font-size: clamp(22px, 3.2vw, 36px);
      line-height: 1.15;
      letter-spacing: -.06em;
      font-weight: 800;
    }

    .panel .desc {
      margin-top: 8px;
      color: rgba(245,238,255,.70);
      line-height: 1.5;
      font-size: 14px;
    }

    .detail-modal {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: grid;
      place-items: center;
      padding: 28px;
      background:
        radial-gradient(circle at 50% 50%, rgba(116,89,210,.18), transparent 34%),
        rgba(3,2,9,.72);
      backdrop-filter: blur(10px);
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease;
    }

    .detail-modal.show {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-card {
      width: min(680px, calc(100vw - 40px));
      max-height: min(74vh, 720px);
      overflow: auto;
      border-radius: 30px;
      padding: 26px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.13), rgba(255,255,255,.06)),
        rgba(12,8,30,.90);
      border: 1px solid rgba(255,255,255,.20);
      box-shadow:
        0 30px 120px rgba(0,0,0,.58),
        0 0 70px rgba(159,108,255,.22);
    }

    .modal-top {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: flex-start;
      margin-bottom: 16px;
    }

    .modal-kicker {
      color: var(--cyan);
      font-size: 12px;
      letter-spacing: .16em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .modal-title {
      margin: 0;
      font-size: clamp(26px, 4vw, 46px);
      letter-spacing: -.065em;
      line-height: 1.05;
    }

    .modal-close {
      flex: 0 0 auto;
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(255,255,255,.08);
      color: white;
      width: 38px;
      height: 38px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 20px;
    }

    .modal-body {
      color: rgba(246,240,255,.82);
      line-height: 1.72;
      font-size: 15px;
      white-space: pre-wrap;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 22px;
    }

    .modal-actions button {
      border: 0;
      border-radius: 999px;
      padding: 11px 15px;
      cursor: pointer;
      font-weight: 900;
    }

    .ghost-button {
      color: white;
      background: rgba(255,255,255,.09);
      border: 1px solid rgba(255,255,255,.14) !important;
    }

    .primary-button {
      color: #110925;
      background: linear-gradient(135deg,#f4edff,#aeeaff);
    }

    .status {
      position: fixed;
      right: max(28px, env(safe-area-inset-right));
      bottom: max(28px, env(safe-area-inset-bottom));
      z-index: 12;
      padding: 10px 13px;
      color: rgba(245,238,255,.62);
      border: 1px solid var(--line);
      background: rgba(10,7,24,.42);
      border-radius: 999px;
      font-size: 12px;
      backdrop-filter: blur(14px);
    }

    @media (max-width: 760px) {
      .title {
        top: max(18px, env(safe-area-inset-top));
        left: 18px;
        max-width: 230px;
      }

      .title h1 { font-size: 42px; }
      .title p { font-size: 12px; }

      .canvas-wrap {
        width: 100vmin;
        height: 100vmin;
        margin-top: -7vh;
      }

      .well {
        width: 130px;
        height: 130px;
      }

      .input-dock {
        left: 14px;
        right: 14px;
        top: auto;
        bottom: calc(94px + env(safe-area-inset-bottom));
        width: auto;
        backdrop-filter: none;
      }

      .panel {
        bottom: calc(160px + env(safe-area-inset-bottom));
        backdrop-filter: none;
      }

      .status { display: none; }
      .detail-modal { backdrop-filter: none; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="title">
      <h1>Aemang<br />sieve</h1>
      <p>생각 한 가닥을 꺼내 우물에 떨어뜨리면, 아이디어들이 천체처럼 공전합니다.</p>
    </section>

    <section class="canvas-wrap" id="canvasWrap">
      <canvas id="ideaCanvas" width="760" height="760">
        현재 브라우저는 canvas를 지원하지 않습니다.
      </canvas>

      <div class="well">
        <div class="well-label">
          <strong>펜시브</strong>
          기억의 수면
        </div>
      </div>

      <div id="ideaTags">
        <ul id="ideaList"></ul>
      </div>
    </section>

    <form class="input-dock" id="ideaForm">
      <input id="ideaInput" autocomplete="off" placeholder="기억 한 가닥을 적어보기" />
      <button type="submit">drop</button>
    </form>

    <section class="panel" id="panel">
      <div class="eyebrow">selected memory</div>
      <div class="selected" id="selectedText">기억 저장소</div>
      <div class="desc">태그 위에 마우스를 올리면 회전이 감속되고, 클릭하면 기억이 앞으로 다가온 뒤 상세 내용을 엽니다.</div>
    </section>

    <section class="detail-modal" id="detailModal" aria-hidden="true">
      <article class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal-top">
          <div>
            <div class="modal-kicker">memory detail</div>
            <h2 class="modal-title" id="modalTitle">기억 제목</h2>
          </div>
          <button class="modal-close" id="modalClose" type="button" aria-label="닫기">×</button>
        </div>
        <div class="modal-body" id="modalBody"></div>
        <div class="modal-actions">
          <button class="ghost-button" id="modalOpenPage" type="button">새 창에서 보기</button>
          <button class="primary-button" id="modalDone" type="button">우물로 돌아가기</button>
        </div>
      </article>
    </section>

    <div class="status" id="status">loading TagCanvas...</div>
  </main>

  <script src="https://www.goat1000.com/tagcanvas.min.js"></script>
  <script>
    (() => {
      const canvas = document.getElementById("ideaCanvas");
      const wrap = document.getElementById("canvasWrap");
      const list = document.getElementById("ideaList");
      const form = document.getElementById("ideaForm");
      const input = document.getElementById("ideaInput");
      const panel = document.getElementById("panel");
      const selectedText = document.getElementById("selectedText");
      const detailModal = document.getElementById("detailModal");
      const modalTitle = document.getElementById("modalTitle");
      const modalBody = document.getElementById("modalBody");
      const modalClose = document.getElementById("modalClose");
      const modalDone = document.getElementById("modalDone");
      const modalOpenPage = document.getElementById("modalOpenPage");
      const status = document.getElementById("status");

      const isMobile = matchMedia("(max-width: 760px)").matches;
      const data = [
        {
          title: "비밀번호 대신 기억 조각으로 로그인",
          detail: "정답 문자열이 아니라 사용자의 기억 조각을 조합해서 인증하는 UX. 보안 기능이라기보다 시적이고 개인적인 온보딩 경험에 가깝다.",
          openMode: "modal"
        },
        {
          title: "하루 끝에 남는 단어 하나",
          detail: "매일 긴 일기를 쓰게 하지 말고, 하루가 끝났을 때 머릿속에 끝까지 남은 단어 하나만 저장하게 한다.",
          openMode: "modal"
        },
        {
          title: "혼잣말을 저장하는 작은 우물",
          detail: "메모는 너무 생산성 도구 같고, 일기는 너무 부담스럽다. 그 사이 어딘가에 있는 저장소. 사용자는 완성된 문장을 쓰지 않아도 된다. 생각의 파편, 감정의 찌꺼기, 이상하게 남은 이미지, 이름 붙일 수 없는 느낌을 그냥 떨어뜨린다.\n\n우물은 정리하지 않는다. 다만 가라앉히고, 보존하고, 언젠가 다시 떠오르게 한다.\n\n이 서비스의 핵심은 검색이 아니라 회상이다.",
          openMode: "page"
        },
        { title: "언젠가 만들 서비스 이름", detail: "아직 구현보다 이름이 먼저 떠오른 프로젝트들을 저장하는 별도 컬렉션.", openMode: "modal" },
        { title: "밤 2시에 떠오른 문장", detail: "낮에는 민망하지만 새벽에는 확실해 보였던 문장들을 버리지 않고 저장한다.", openMode: "modal" },
        { title: "사라지기 직전의 기획", detail: "회의록이나 PRD가 되기 전, 거의 사라질 뻔한 기획의 전 단계.", openMode: "modal" },
        { title: "아이디어의 중력", detail: "아이디어들은 같은 무게로 존재하지 않는다. 어떤 것은 자꾸 주변 생각을 끌어당기고, 어떤 것은 멀리서만 돈다.", openMode: "modal" },
        { title: "좋은데 설명하기 어려운 느낌", detail: "논리보다 먼저 오는 확신. 아직 근거는 없지만 이상하게 계속 마음에 남는 감각.", openMode: "modal" },
        { title: "폴더가 아니라 수면 아래", detail: "분류하지 않고 가라앉히는 저장 방식. 폴더 대신 깊이, 태그 대신 파문.", openMode: "modal" },
        { title: "쓸모없어 보여도 버리지 않기", detail: "지금은 쓸모없어 보여도 나중에 다른 생각과 결합될 수 있으니 버리지 않는다.", openMode: "modal" },
        { title: "나중의 내가 발견할 단서", detail: "현재의 내가 미래의 나에게 남기는 작고 이상한 힌트.", openMode: "modal" },
        { title: "머릿속에서 꺼낸 은빛 실", detail: "입력창을 단순 텍스트 박스로 보이게 하지 않고, 사용자가 머리에서 실을 뽑아 우물에 넣는 제스처처럼 느끼게 만든다.", openMode: "modal" },
        { title: "태그가 아니라 별자리", detail: "태그 클라우드가 아니라 별자리. 클릭하면 주변 별들이 같이 반응해야 한다.", openMode: "modal" },
        { title: "기억을 클릭하면 수면이 열린다", detail: "상세 화면은 카드가 튀어나오는 느낌보다, 수면이 열리고 아래에 있던 기억이 드러나는 느낌이어야 한다.", openMode: "modal" },
        { title: "아직 이름 없는 프로젝트", detail: "이름 붙이기 전의 프로젝트는 너무 쉽게 사라진다.", openMode: "modal" },
        { title: "문장 이전의 감각", detail: "문장이 되기 전의 감각도 저장할 수 있는가?", openMode: "modal" }
      ];

      function setCanvasSize() {
        const rect = wrap.getBoundingClientRect();
        const size = Math.max(320, Math.floor(Math.min(rect.width, rect.height)));
        canvas.width = size;
        canvas.height = size;
      }

      function buildTagList() {
        list.innerHTML = "";

        data.forEach((item, index) => {
          const li = document.createElement("li");
          const a = document.createElement("a");
          a.href = "javascript:void(0)";
          a.textContent = item.title;
          a.setAttribute("data-index", String(index));
          a.style.fontSize = isMobile ? "16px" : "20px";
          a.style.color = "#efe8ff";
          a.onclick = function () {
            selectMemory(index, true);
            return false;
          };

          li.appendChild(a);
          list.appendChild(li);
        });
      }

      function startTagCanvas() {
        setCanvasSize();
        buildTagList();

        if (!window.TagCanvas) {
          status.textContent = "TagCanvas CDN 로드 실패";
          return;
        }

        try {
          try { TagCanvas.Delete("ideaCanvas"); } catch (_) {}

          const ok = TagCanvas.Start("ideaCanvas", "ideaTags", {
            textColour: "#efe8ff",
            textHeight: isMobile ? 16 : 21,
            textFont: "Arial, Helvetica, sans-serif",

            outlineMethod: "block",
            outlineColour: "#ffffff",
            outlineThickness: 1,
            outlineOffset: 6,

            shadow: isMobile ? null : "#a582ff",
            shadowBlur: isMobile ? 0 : 4,
            shadowOffset: [0, 0],

            reverse: true,
            depth: 0.85,
            maxSpeed: isMobile ? 0.03 : 0.05,
            minSpeed: 0.005,
            initial: [0.08, -0.04],
            decel: 0.96,

            dragControl: true,
            dragThreshold: 4,
            wheelZoom: false,

            freezeActive: true,
            freezeDecel: true,
            activeCursor: "pointer",
            clickToFront: 650,
            frontSelect: true,

            fadeIn: 500,
            interval: isMobile ? 35 : 20,
            noSelect: true,
            pinchZoom: false
          });

          status.textContent = ok ? "TagCanvas mode" : "TagCanvas 시작 실패: 태그 목록 또는 캔버스 인식 실패";
        } catch (error) {
          status.textContent = "TagCanvas 오류: " + error.message;
        }
      }

      function selectMemory(index, openDetail) {
        const item = data[index];
        if (!item) return;

        selectedText.textContent = item.title;
        panel.classList.add("show");

        if (openDetail) {
          setTimeout(() => openMemory(item), 260);
        }
      }

      function shouldOpenAsPage(item) {
        if (item.url) return true;
        if (item.openMode === "page") return true;
        if (item.openMode === "modal") return false;
        return (item.detail || "").length > 220;
      }

      function openMemory(item) {
        if (shouldOpenAsPage(item)) openDetailPage(item);
        else openDetailModal(item);
      }

      function openDetailModal(item) {
        modalTitle.textContent = item.title;
        modalBody.textContent = item.detail || "상세 내용이 없습니다.";
        modalOpenPage.onclick = () => openDetailPage(item);
        detailModal.classList.add("show");
        detailModal.setAttribute("aria-hidden", "false");
      }

      function closeDetailModal() {
        detailModal.classList.remove("show");
        detailModal.setAttribute("aria-hidden", "true");
      }

      function escapeHTML(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function openDetailPage(item) {
        if (item.url) {
          window.open(item.url, "_blank", "noopener,noreferrer");
          return;
        }

        const title = escapeHTML(item.title);
        const detail = escapeHTML(item.detail || "상세 내용이 없습니다.").replaceAll("\n", "<br />");
        const page = `<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>${title} — Aemangsieve</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: #f6f0ff;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      background: radial-gradient(circle at 50% 20%, rgba(138,104,255,.24), transparent 34%), #05030b;
    }
    main { width: min(860px, calc(100vw - 36px)); margin: 0 auto; padding: 72px 0; }
    .kicker { color: #8feaff; font-size: 12px; letter-spacing: .18em; text-transform: uppercase; margin-bottom: 14px; }
    h1 { margin: 0 0 26px; font-size: clamp(38px, 7vw, 82px); line-height: .95; letter-spacing: -.075em; }
    article { border: 1px solid rgba(255,255,255,.16); background: rgba(255,255,255,.07); border-radius: 32px; padding: clamp(24px, 4vw, 44px); }
    .body { color: rgba(246,240,255,.84); font-size: 18px; line-height: 1.82; }
    .back { display: inline-flex; margin-top: 28px; color: #110925; background: linear-gradient(135deg,#f4edff,#aeeaff); text-decoration: none; font-weight: 900; padding: 12px 16px; border-radius: 999px; }
  </style>
</head>
<body>
  <main>
    <div class="kicker">memory detail</div>
    <h1>${title}</h1>
    <article>
      <div class="body">${detail}</div>
      <a class="back" href="javascript:window.close()">우물로 돌아가기</a>
    </article>
  </main>
</body>
</html>`;

        const blob = new Blob([page], { type: "text/html;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        window.open(url, "_blank", "noopener,noreferrer");
        setTimeout(() => URL.revokeObjectURL(url), 60000);
      }

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        const text = input.value.trim();
        if (!text) return;

        data.push({
          title: text,
          detail: "방금 떨어뜨린 새 기억입니다. 여기에는 상세 메모, 참고 링크, 다음에 할 일 등을 붙일 수 있습니다.",
          openMode: "modal"
        });

        input.value = "";
        startTagCanvas();
        selectMemory(data.length - 1, false);
      });

      modalClose.addEventListener("click", closeDetailModal);
      modalDone.addEventListener("click", closeDetailModal);
      detailModal.addEventListener("click", (event) => {
        if (event.target === detailModal) closeDetailModal();
      });

      window.addEventListener("keydown", (event) => {
        if (event.key === "Escape") closeDetailModal();
      });

      let resizeTimer = null;
      window.addEventListener("resize", () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(startTagCanvas, 180);
      });

      window.addEventListener("load", startTagCanvas);
    })();
  </script>
</body>
</html>
