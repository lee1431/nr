<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stream Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bg: #0b0f1a; --card: #161e2d; --accent: #3b82f6; }
        body { background: var(--bg); color: white; margin: 0; font-family: sans-serif; overflow-x: hidden; }
        .gallery-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 4px; padding: 4px; max-width: 1600px; margin: 0 auto; }
        @media (min-width: 768px) { .gallery-container { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; padding: 16px; } }
        .img-card { background: var(--card); border-radius: 8px; overflow: hidden; aspect-ratio: 1/1; opacity: 0; transform: translateY(20px); transition: all 0.6s ease-out; }
        .img-card.loaded { opacity: 1; transform: translateY(0); }
        .img-card img { width: 100%; height: 100%; object-fit: cover; }
        #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(10px); }
        #modal.active { display: flex; }
        .loader { display: flex; flex-direction: column; align-items: center; padding: 60px 0; min-height: 100px; }
        .spinner { width: 30px; height: 30px; border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        .end-msg { display: none; color: #4b5563; font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <header class="sticky top-0 z-50 bg-[#0b0f1a]/80 backdrop-blur-md border-b border-white/5 px-6 py-4">
        <h1 class="text-center text-lg font-bold tracking-widest">GALLERY FEED</h1>
    </header>

    <main id="gallery" class="gallery-container"></main>

    <div id="sentinel" class="loader">
        <div id="spinner" class="spinner"></div>
        <div id="end-msg" class="end-msg">End of Content</div>
    </div>

    <div id="modal" onclick="closeModal()">
        <img id="modal-img" class="max-w-[95%] max-h-[90vh] rounded-lg shadow-2xl" src="">
    </div>

    <script>
        const BASE_URL = "https://localflow.ddns.net/fu";
        let currentPage = 1;
        const limit = 16;
        let isLoading = false;
        let hasMore = true;

        const gallery = document.getElementById('gallery');
        const sentinel = document.getElementById('sentinel');
        const spinner = document.getElementById('spinner');
        const endMsg = document.getElementById('end-msg');

        // [중요] 화면에 로딩바가 보이는지 확인하는 함수
        function isSentinelInView() {
            const rect = sentinel.getBoundingClientRect();
            return rect.top < window.innerHeight;
        }

        async function loadNextPage() {
            if (isLoading || !hasMore) return;
            isLoading = true;
            console.log(`불러오는 중... 페이지: ${currentPage}`);

            try {
                const res = await fetch(`${BASE_URL}/api/images?page=${currentPage}&limit=${limit}`);
                const items = await res.json();

                if (!items || items.length === 0) {
                    stopInfiniteScroll();
                } else {
                    render(items);
                    if (items.length < limit) {
                        stopInfiniteScroll();
                    } else {
                        currentPage++;
                        // 만약 이미지를 불러왔는데도 여전히 로딩바가 화면에 보이면 (화면을 다 못 채웠으면)
                        // 다음 페이지를 즉시 다시 호출함
                        if (isSentinelInView()) {
                            isLoading = false; // 플래그 해제 후 재호출
                            loadNextPage();
                        }
                    }
                }
            } catch (err) {
                console.error("실패:", err);
                stopInfiniteScroll();
            } finally {
                isLoading = false;
            }
        }

        function stopInfiniteScroll() {
            hasMore = false;
            observer.unobserve(sentinel);
            spinner.style.display = 'none';
            endMsg.style.display = 'block';
        }

        function render(items) {
            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'img-card';
                const img = document.createElement('img');
                img.src = item.url;
                img.onload = () => card.classList.add('loaded');
                card.onclick = (e) => {
                    e.stopPropagation();
                    document.getElementById('modal-img').src = item.url;
                    document.getElementById('modal').classList.add('active');
                    document.body.style.overflow = 'hidden';
                };
                card.appendChild(img);
                gallery.appendChild(card);
            });
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            document.body.style.overflow = '';
        }

        const observer = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting) loadNextPage();
        }, { rootMargin: '400px' });

        window.onload = () => {
            observer.observe(sentinel);
        };
    </script>
</body>
</html>
