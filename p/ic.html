<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Ascent - Stable v1.2</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .game-outer { position: relative; width: 400px; height: 700px; box-shadow: 0 0 50px rgba(0,255,255,0.3); border-radius: 20px; overflow: hidden; border: 2px solid #333; }
        canvas { display: block; }
        .ui { position: absolute; bottom: 0; width: 100%; height: 100px; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; gap: 10px; z-index: 100; border-top: 1px solid #444; }
        .stats { position: absolute; top: 30px; left: 30px; pointer-events: none; z-index: 100; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
        #altimeter { font-size: 1rem; color: #00d4ff; font-weight: bold; margin-top: 5px; }
        #score { font-size: 3rem; font-weight: bold; color: #FFD700; line-height: 1; }
        button { padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; font-size: 1.1rem; }
        #dropBtn { background: #00d4ff; color: #000; width: 200px; }
        #resetBtn { background: #444; color: #ccc; width: 80px; font-size: 0.8rem; }
        button:active { transform: scale(0.95); }
        #gameOverScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 200; }
    </style>
</head>
<body>
    <div class="game-outer" id="container">
        <div id="gameOverScreen">
            <h1 style="color:#ff4444; font-size: 3rem; margin-bottom: 10px;">CRASHED!</h1>
            <p id="finalStat" style="font-size: 1.5rem; margin-bottom: 30px; color: #fff;"></p>
            <button onclick="init()" style="background:#FFD700; color:#000; padding: 15px 50px;">RETRY</button>
        </div>

        <div class="stats">
            <div id="score">0</div>
            <div id="altimeter">Mariana Trench</div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div class="ui">
            <button id="resetBtn">RESET</button>
            <button id="dropBtn">DROP COIN</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const altEl = document.getElementById('altimeter');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalStatEl = document.getElementById('finalStat');
        
        canvas.width = 400;
        canvas.height = 700;

        const COIN_W = 80;
        const COIN_H = 16;
        
        let coins = [];
        let currentCoin = {};
        let score = 0;
        let isDropping = false;
        let cameraY = 0; 
        let targetCameraY = 0;
        let isGameOver = false;
        let requestId;

        function init() {
            if (requestId) cancelAnimationFrame(requestId);
            score = 0;
            isGameOver = false;
            isDropping = false;
            
            // 초기 카메라 위치 설정: 바닥 동전이 화면 하단에 오도록
            const initialBaseY = canvas.height - 150;
            cameraY = -(initialBaseY - (canvas.height - 150));
            targetCameraY = cameraY;

            coins = [{ x: canvas.width / 2 - COIN_W / 2, y: initialBaseY, w: COIN_W, h: COIN_H }];
            
            scoreEl.innerText = "0";
            altEl.innerText = "Mariana Trench (-10,994m)";
            gameOverScreen.style.display = "none";
            
            newLevel();
            loop();
        }

        function newLevel() {
            const speedBase = 3;
            const speedInc = Math.min(score * 0.15, 15);
            
            currentCoin = {
                x: Math.random() * (canvas.width - COIN_W),
                // 월드 좌표 기준: 현재 화면 상단(cameraY 역산)에서 100px 아래
                y: -cameraY + 100, 
                w: COIN_W,
                h: COIN_H,
                vx: (speedBase + speedInc) * (Math.random() > 0.5 ? 1 : -1)
            };
            isDropping = false;
        }

        function getBGColor() {
            if (score < 100) return '#001219'; // 마리아나 해구
            if (score < 300) return '#005f73'; // 심해
            if (score < 600) return '#0a9396'; // 해수면 근처
            if (score < 900) return '#94d2bd'; // 하늘
            if (score < 1100) return '#001219'; // 대기권 진입
            return '#000000'; // 우주
        }

        function loop() {
            if (isGameOver) return;

            // 1. 카메라 추적 로직 (Lerp)
            // 탑의 꼭대기가 화면의 60% 지점에 위치하도록 카메라 타겟 설정
            const lastCoin = coins[coins.length - 1];
            targetCameraY = -lastCoin.y + (canvas.height * 0.6);
            cameraY += (targetCameraY - cameraY) * 0.08;

            // 2. 배경 그리기
            ctx.fillStyle = getBGColor();
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 3. 우주 배경 별 효과 (1000개 이상)
            if (score > 1000) {
                ctx.fillStyle = "white";
                for(let i=0; i<30; i++) {
                    let x = (Math.sin(i * 123.45) * 0.5 + 0.5) * canvas.width;
                    let y = (Math.cos(i * 678.9) * 0.5 + 0.5) * canvas.height;
                    ctx.fillRect(x, y, 1.5, 1.5);
                }
            }

            // 4. 쌓인 동전들 그리기 (모두 카메라 좌표 적용)
            coins.forEach((c, i) => {
                const drawY = c.y + cameraY;
                if (drawY > -50 && drawY < canvas.height + 50) {
                    ctx.fillStyle = `hsl(${45 + (i * 0.2)}, 80%, ${Math.max(20, 70 - (i/40))}%)`;
                    ctx.fillRect(c.x, drawY, c.w, c.h);
                    ctx.strokeStyle = "rgba(0,0,0,0.3)";
                    ctx.lineWidth = 1;
                    ctx.strokeRect(c.x, drawY, c.w, c.h);
                }
            });

            // 5. 현재 동전 로직
            if (!isDropping) {
                // 대기 중일 때는 화면 상단에 고정되도록 월드 좌표를 카메라에 맞춰 업데이트
                currentCoin.y = -cameraY + 100;
                currentCoin.x += currentCoin.vx;
                if (currentCoin.x < 0 || currentCoin.x + currentCoin.w > canvas.width) currentCoin.vx *= -1;
            } else {
                // 낙하 시에는 월드 좌표만 증가 (중력 효과)
                currentCoin.y += 18; 
                
                const target = coins[coins.length - 1];
                if (currentCoin.y + currentCoin.h >= target.y) {
                    const diff = currentCoin.x - target.x;
                    
                    if (Math.abs(diff) < currentCoin.w) {
                        // 착지 성공
                        score++;
                        scoreEl.innerText = score;
                        
                        const depth = -10994 + (score * 11);
                        altEl.innerText = score < 1000 ? `Altitude: ${Math.floor(depth)}m` : `Deep Space Lv.${score - 1000}`;
                        if(score >= 1000) altEl.style.color = "#ff00ff"; else altEl.style.color = "#00d4ff";

                        coins.push({ x: currentCoin.x, y: target.y - COIN_H, w: COIN_W, h: COIN_H });
                        newLevel();
                    } else {
                        // 게임 오버
                        isGameOver = true;
                        finalStatEl.innerText = `Final Score: ${score}`;
                        gameOverScreen.style.display = "flex";
                    }
                }
            }
            
            // 6. 현재 조작 동전 그리기 (역시 카메라 좌표 적용)
            const currentDrawY = currentCoin.y + cameraY;
            ctx.fillStyle = "#FFD700";
            ctx.fillRect(currentCoin.x, currentDrawY, currentCoin.w, currentCoin.h);
            ctx.strokeStyle = "#000";
            ctx.strokeRect(currentCoin.x, currentDrawY, currentCoin.w, currentCoin.h);

            requestId = requestAnimationFrame(loop);
        }

        document.getElementById('dropBtn').addEventListener('click', () => {
            if (!isGameOver && !isDropping) isDropping = true;
        });
        
        document.getElementById('resetBtn').addEventListener('click', () => {
            if(confirm("Planet Chungju: 리셋하시겠습니까?")) init();
        });

        window.onload = init;
    </script>
</body>
</html>
