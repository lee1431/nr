<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Future Grid Music Player</title>
  <style>
    :root {
      --bg: #f4f7f2;
      --ink: #111816;
      --muted: #68736d;
      --line: rgba(17, 24, 22, 0.12);
      --accent: #0a3f34;
      --neon: #7fffd4;
      --card: rgba(255, 255, 255, 0.62);
      --shadow: 0 32px 110px rgba(10, 63, 52, 0.2);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      color: var(--ink);
      background:
        linear-gradient(var(--line) 1px, transparent 1px),
        linear-gradient(90deg, var(--line) 1px, transparent 1px),
        radial-gradient(circle at 22% 15%, rgba(127, 255, 212, 0.36), transparent 28%),
        radial-gradient(circle at 82% 72%, rgba(10, 63, 52, 0.2), transparent 30%),
        linear-gradient(135deg, #f8faf6, #edf3ee 45%, #f7f8f5);
      background-size: 30px 30px, 30px 30px, auto, auto, auto;
      padding: 24px;
    }

    .app {
      width: min(1180px, 100%);
      display: grid;
      grid-template-columns: 330px minmax(360px, 480px);
      gap: 18px;
      align-items: start;
    }

    .panel,
    .player {
      border: 1px solid rgba(127, 255, 212, 0.34);
      background: linear-gradient(145deg, var(--card), rgba(255, 255, 255, 0.38));
      backdrop-filter: blur(24px) saturate(1.35);
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255, 255, 255, 0.72);
      position: relative;
      clip-path: polygon(0 0, calc(100% - 22px) 0, 100% 22px, 100% 100%, 22px 100%, 0 calc(100% - 22px));
    }

    .panel { padding: 18px; }
    .player { padding: 22px; }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .eyebrow {
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .status {
      font-size: 11px;
      border: 1px solid rgba(127, 255, 212, 0.44);
      padding: 7px 9px;
      color: var(--accent);
      background: rgba(255, 255, 255, 0.42);
      box-shadow: 0 0 24px rgba(127, 255, 212, 0.28);
      white-space: nowrap;
    }

    .library {
      display: grid;
      gap: 8px;
      max-height: 630px;
      overflow: auto;
      padding-right: 4px;
    }

    .cover {
      aspect-ratio: 1 / 0.72;
      border: 1px solid rgba(10, 63, 52, 0.16);
      display: grid;
      place-items: center;
      margin-bottom: 20px;
      background:
        linear-gradient(135deg, rgba(127, 255, 212, 0.2), transparent 36%),
        radial-gradient(circle, transparent 0 40%, rgba(10, 63, 52, 0.05) 41% 42%, transparent 43%),
        repeating-linear-gradient(90deg, transparent 0 17px, rgba(10, 63, 52, 0.08) 18px),
        rgba(238, 246, 239, 0.76);
      overflow: hidden;
      position: relative;
      clip-path: polygon(0 0, calc(100% - 18px) 0, 100% 18px, 100% 100%, 18px 100%, 0 calc(100% - 18px));
    }

    .cover::before {
      content: "AUDIO SPECTRUM // 2088";
      position: absolute;
      left: 14px;
      top: 12px;
      font-size: 10px;
      letter-spacing: 0.18em;
      color: rgba(10, 63, 52, 0.55);
    }

    .disc {
      width: 138px;
      height: 138px;
      border-radius: 50%;
      border: 1px solid rgba(127, 255, 212, 0.65);
      background:
        radial-gradient(circle, #f7f8f5 0 10px, var(--neon) 11px 15px, transparent 16px),
        repeating-radial-gradient(circle, rgba(255, 255, 255, 0.5) 0 2px, transparent 3px 9px),
        conic-gradient(from 140deg, rgba(10, 63, 52, 0.96), rgba(127, 255, 212, 0.16), rgba(10, 63, 52, 0.94));
      box-shadow: 0 0 44px rgba(127, 255, 212, 0.34);
      animation: spin 8s linear infinite;
      animation-play-state: paused;
    }

    .playing .disc { animation-play-state: running; }
    @keyframes spin { to { transform: rotate(360deg); } }

    h1 {
      margin: 0 0 7px;
      font-size: 31px;
      line-height: 1.02;
      letter-spacing: -0.055em;
    }

    .artist {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 14px;
    }

    .progress-wrap { display: grid; gap: 8px; margin-bottom: 14px; }

    .volume-wrap {
      display: grid;
      grid-template-columns: 40px 1fr;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      color: var(--muted);
      font-size: 12px;
    }

    .volume-wrap input {
      width: 100%;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .time {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: 12px;
      font-variant-numeric: tabular-nums;
    }

    input[type="range"] { width: 100%; accent-color: var(--accent); cursor: pointer; }

    .controls {
      display: grid;
      grid-template-columns: 1fr 68px 1fr;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .modes {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 14px;
    }

    button {
      border: 1px solid rgba(10, 63, 52, 0.16);
      background: rgba(255, 255, 255, 0.48);
      color: var(--ink);
      min-height: 42px;
      cursor: pointer;
      font: inherit;
      letter-spacing: 0.04em;
      transition: transform 0.16s ease, background 0.16s ease, border-color 0.16s ease, box-shadow 0.16s ease;
      clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px));
    }

    button:hover {
      transform: translateY(-1px);
      background: #fff;
      border-color: rgba(127, 255, 212, 0.58);
      box-shadow: 0 0 22px rgba(127, 255, 212, 0.22);
    }

    button.active {
      color: var(--accent);
      border-color: rgba(127, 255, 212, 0.64);
      background: rgba(185, 255, 233, 0.34);
      box-shadow: inset 3px 0 0 var(--accent), 0 0 20px rgba(127, 255, 212, 0.18);
    }

    .play {
      width: 68px;
      height: 68px;
      border-radius: 999px;
      clip-path: none;
      background: var(--accent);
      color: white;
      font-size: 23px;
      box-shadow: 0 18px 40px rgba(10, 63, 52, 0.25), 0 0 34px rgba(127, 255, 212, 0.35);
    }

    .loader {
      padding: 12px;
      border: 1px solid rgba(127, 255, 212, 0.32);
      background: rgba(255, 255, 255, 0.24);
      margin-bottom: 14px;
    }

    .loader p { margin: 0; color: var(--muted); font-size: 12px; line-height: 1.5; }
    .loader code { color: var(--accent); font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }

    .queue-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 14px 0 8px;
      color: var(--accent);
      font-size: 11px;
      letter-spacing: 0.16em;
    }

    .queue-title button { min-height: 30px; font-size: 11px; padding: 0 10px; }

    .queue {
      border-top: 1px solid var(--line);
      padding-top: 10px;
      display: grid;
      gap: 8px;
      max-height: 220px;
      overflow: auto;
    }

    .item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 10px;
      border: 1px solid transparent;
      color: var(--muted);
      font-size: 13px;
      background: rgba(255, 255, 255, 0.2);
    }

    .item.active {
      color: var(--accent);
      border-color: rgba(127, 255, 212, 0.42);
      background: rgba(185, 255, 233, 0.34);
      box-shadow: inset 3px 0 0 var(--accent), 0 0 24px rgba(127, 255, 212, 0.16);
    }

    .song-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .song-sub { display: block; margin-top: 4px; font-size: 11px; color: var(--muted); }

    .mini-actions { display: flex; gap: 6px; }
    .mini-actions button { min-height: 30px; padding: 0 9px; font-size: 11px; }

    @media (max-width: 880px) {
      .app { grid-template-columns: 1fr; }
      .library { max-height: 260px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <aside class="panel">
      <div class="topbar">
        <div class="eyebrow">ALL TRACKS</div>
        <div class="status" id="libraryCount">LOADING</div>
      </div>
      <section class="loader">
        <p>GitHub <code>main/assets/muz</code> 폴더의 <code>.mp3</code> 파일을 자동 조회합니다. 좌측에서 <code>ADD</code>를 누르면 하단 재생 목록에 들어갑니다.</p>
      </section>
      <section class="library" id="library"></section>
    </aside>

    <section class="player" id="player">
      <div class="topbar">
        <div class="eyebrow">STNS FUTURE AUDIO</div>
        <div class="status" id="status">READY</div>
      </div>

      <section class="cover" aria-label="album cover">
        <div class="disc"></div>
      </section>

      <section class="meta">
        <h1 id="title">No Track</h1>
        <p class="artist" id="artist">큐에 음악을 추가하세요</p>
      </section>

      <section class="progress-wrap">
        <input id="progress" type="range" min="0" max="100" value="0" aria-label="progress" />
        <div class="time">
          <span id="current">0:00</span>
          <span id="duration">0:00</span>
        </div>
      </section>

      <section class="volume-wrap">
        <label>VOL</label>
        <input id="volume" type="range" min="0" max="1" step="0.01" value="1" />
      </section>

      <section class="controls">
        <button id="prev" type="button">PREV</button>
        <button id="play" class="play" type="button" aria-label="play">▶</button>
        <button id="next" type="button">NEXT</button>
      </section>

      <section class="modes">
        <button id="modeAll" class="active" type="button">ALL</button>
        <button id="modeOne" type="button">ONE</button>
        <button id="modeShuffle" type="button">SHUFFLE</button>
      </section>

      <div class="queue-title">
        <span>PLAY QUEUE</span>
        <button id="clearQueue" type="button">CLEAR</button>
      </div>
      <section class="queue" id="queue"></section>

      <audio id="audio"></audio>
    </section>
  </main>

  <script>
    const repo = 'lee1431/nr';
    const branch = 'main';
    const folderPath = 'assets/muz';

    let libraryTracks = [];
    let queueTracks = [];
    let queueIndex = 0;
    let playMode = 'all';

    const player = document.getElementById('player');
    const audio = document.getElementById('audio');
    const title = document.getElementById('title');
    const artist = document.getElementById('artist');
    const playBtn = document.getElementById('play');
    const prevBtn = document.getElementById('prev');
    const nextBtn = document.getElementById('next');
    const progress = document.getElementById('progress');
    const volume = document.getElementById('volume');
    const current = document.getElementById('current');
    const duration = document.getElementById('duration');
    const status = document.getElementById('status');
    const library = document.getElementById('library');
    const queue = document.getElementById('queue');
    const libraryCount = document.getElementById('libraryCount');
    const modeAll = document.getElementById('modeAll');
    const modeOne = document.getElementById('modeOne');
    const modeShuffle = document.getElementById('modeShuffle');
    const clearQueue = document.getElementById('clearQueue');

    function formatTime(seconds) {
      if (Number.isNaN(seconds) || !Number.isFinite(seconds)) return '0:00';
      const min = Math.floor(seconds / 60);
      const sec = Math.floor(seconds % 60).toString().padStart(2, '0');
      return `${min}:${sec}`;
    }

    function renderLibrary() {
      libraryCount.textContent = `${libraryTracks.length} FILES`;
      library.innerHTML = libraryTracks.map((track, index) => `
        <div class="item">
          <div class="song-name">
            ${String(index + 1).padStart(2, '0')} · ${track.title}
            <span class="song-sub">${track.artist}</span>
          </div>
          <div class="mini-actions">
            <button type="button" data-add="${index}">ADD</button>
          </div>
        </div>
      `).join('');
    }

    function renderQueue() {
      if (!queueTracks.length) {
        queue.innerHTML = '<div class="item">재생할 음악을 좌측 목록에서 추가하세요.</div>';
        return;
      }

      queue.innerHTML = queueTracks.map((track, index) => `
        <div class="item ${index === queueIndex ? 'active' : ''}">
          <div class="song-name" data-play="${index}">
            ${String(index + 1).padStart(2, '0')} · ${track.title}
            <span class="song-sub">${track.artist}</span>
          </div>
          <div class="mini-actions">
            <button type="button" data-play="${index}">PLAY</button>
            <button type="button" data-remove="${index}">DEL</button>
          </div>
        </div>
      `).join('');
    }

    function setMode(mode) {
      playMode = mode;
      modeAll.classList.toggle('active', mode === 'all');
      modeOne.classList.toggle('active', mode === 'one');
      modeShuffle.classList.toggle('active', mode === 'shuffle');
    }

    function loadQueueTrack(index) {
      if (!queueTracks.length) {
        pauseTrack();
        title.textContent = 'No Track';
        artist.textContent = '큐에 음악을 추가하세요';
        audio.removeAttribute('src');
        progress.value = 0;
        current.textContent = '0:00';
        duration.textContent = '0:00';
        renderQueue();
        return;
      }

      queueIndex = Math.max(0, Math.min(index, queueTracks.length - 1));
      const track = queueTracks[queueIndex];
      title.textContent = track.title;
      artist.textContent = track.artist;
      audio.src = track.src;
      progress.value = 0;
      current.textContent = '0:00';
      duration.textContent = '0:00';
      renderQueue();
    }

    function playTrack() {
      if (!queueTracks.length) return;
      audio.play();
      player.classList.add('playing');
      playBtn.textContent = 'Ⅱ';
      status.textContent = 'PLAYING';
    }

    function pauseTrack() {
      audio.pause();
      player.classList.remove('playing');
      playBtn.textContent = '▶';
      status.textContent = queueTracks.length ? 'PAUSED' : 'READY';
    }

    function togglePlay() {
      if (!queueTracks.length) return;
      audio.paused ? playTrack() : pauseTrack();
    }

    function getRandomQueueIndex() {
      if (queueTracks.length <= 1) return queueIndex;
      let next = queueIndex;
      while (next === queueIndex) {
        next = Math.floor(Math.random() * queueTracks.length);
      }
      return next;
    }

    function nextTrack() {
      if (!queueTracks.length) return;

      // ONE 모드 → 현재 곡 반복
      if (playMode === 'one') {
        audio.currentTime = 0;
        playTrack();
        return;
      }

      let nextIndex;

      // SHUFFLE → 큐 전체에서 랜덤 (현재 곡 제외)
      if (playMode === 'shuffle') {
        if (queueTracks.length === 1) {
          nextIndex = queueIndex;
        } else {
          do {
            nextIndex = Math.floor(Math.random() * queueTracks.length);
          } while (nextIndex === queueIndex);
        }
      } else {
        // ALL → 순차 반복
        nextIndex = (queueIndex + 1) % queueTracks.length;
      }

      loadQueueTrack(nextIndex);
      playTrack();
    }

      const nextIndex = playMode === 'shuffle'
        ? getRandomQueueIndex()
        : (queueIndex + 1) % queueTracks.length;

      loadQueueTrack(nextIndex);
      playTrack();
    }

    function prevTrack() {
      if (!queueTracks.length) return;
      const prevIndex = playMode === 'shuffle'
        ? getRandomQueueIndex()
        : (queueIndex - 1 + queueTracks.length) % queueTracks.length;

      loadQueueTrack(prevIndex);
      playTrack();
    }

    function addToQueue(track) {
      queueTracks.push(track);
      if (queueTracks.length === 1) loadQueueTrack(0);
      renderQueue();
    }

    function removeFromQueue(index) {
      const wasPlaying = !audio.paused;
      const isCurrentTrack = index === queueIndex;

      queueTracks.splice(index, 1);

      if (!queueTracks.length) {
        loadQueueTrack(0);
        return;
      }

      // 현재 재생 중인 곡보다 앞의 곡을 지우면 인덱스만 보정하고 재생은 유지
      if (index < queueIndex) {
        queueIndex -= 1;
        renderQueue();
        return;
      }

      // 현재 재생곡이 아닌 뒤쪽 곡을 지우면 목록만 다시 그림
      if (!isCurrentTrack) {
        renderQueue();
        return;
      }

      // 현재 재생곡을 지운 경우에만 다음 곡으로 교체
      if (queueIndex >= queueTracks.length) queueIndex = 0;
      loadQueueTrack(queueIndex);
      if (wasPlaying) playTrack();
    }

    async function loadMp3FilesFromGitHubFolder() {
      try {
        const apiUrl = `https://api.github.com/repos/${repo}/contents/${folderPath}?ref=${branch}`;
        const response = await fetch(apiUrl, { cache: 'no-store' });
        if (!response.ok) throw new Error('GitHub folder list failed');

        const files = await response.json();
        const mp3Files = files
          .filter(file => file.type === 'file' && file.name.toLowerCase().endsWith('.mp3'))
          .sort((a, b) => a.name.localeCompare(b.name, 'ko'));

        libraryTracks = mp3Files.map(file => ({
          title: decodeURIComponent(file.name.replace(/\.mp3$/i, '')),
          artist: 'GitHub Folder',
          src: file.download_url
        }));

        renderLibrary();
        if (!libraryTracks.length) throw new Error('No mp3 files');
      } catch (error) {
        libraryTracks = [];
        libraryCount.textContent = 'NO MP3';
        library.innerHTML = '<div class="item">main/assets/muz 폴더에서 .mp3 파일을 찾지 못했습니다.</div>';
        status.textContent = 'ERROR';
        console.error(error);
      }
    }

    library.addEventListener('click', (event) => {
      const addButton = event.target.closest('[data-add]');
      if (!addButton) return;
      const index = Number(addButton.dataset.add);
      addToQueue(libraryTracks[index]);
    });

    queue.addEventListener('click', (event) => {
      const playTarget = event.target.closest('[data-play]');
      const removeTarget = event.target.closest('[data-remove]');

      if (removeTarget) {
        removeFromQueue(Number(removeTarget.dataset.remove));
        return;
      }

      if (playTarget) {
        loadQueueTrack(Number(playTarget.dataset.play));
        playTrack();
      }
    });

    playBtn.addEventListener('click', togglePlay);
    nextBtn.addEventListener('click', nextTrack);
    prevBtn.addEventListener('click', prevTrack);
    modeAll.addEventListener('click', () => setMode('all'));
    modeOne.addEventListener('click', () => setMode('one'));
    modeShuffle.addEventListener('click', () => setMode('shuffle'));
    clearQueue.addEventListener('click', () => {
      queueTracks = [];
      queueIndex = 0;
      loadQueueTrack(0);
    });

    audio.addEventListener('loadedmetadata', () => {
      duration.textContent = formatTime(audio.duration);
    });

    audio.addEventListener('timeupdate', () => {
      const percent = (audio.currentTime / audio.duration) * 100 || 0;
      progress.value = percent;
      current.textContent = formatTime(audio.currentTime);
    });

    progress.addEventListener('input', () => {
      if (!audio.duration) return;
      audio.currentTime = (progress.value / 100) * audio.duration;
    });

    volume.addEventListener('input', () => {
      audio.volume = volume.value;
    });

    audio.addEventListener('ended', nextTrack);

    setMode('all');
    renderQueue();
    loadMp3FilesFromGitHubFolder();
  </script>
</body>
</html>
