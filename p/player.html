<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Future Grid Music Player</title>
  <style>
    :root {
      --bg: #f4f7f2;
      --ink: #111816;
      --muted: #68736d;
      --line: rgba(17, 24, 22, 0.12);
      --accent: #0a3f34;
      --neon: #7fffd4;
      --neon-2: #b9ffe9;
      --card: rgba(255, 255, 255, 0.62);
      --glass: rgba(255, 255, 255, 0.36);
      --shadow: 0 32px 110px rgba(10, 63, 52, 0.2);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      color: var(--ink);
      background:
        linear-gradient(var(--line) 1px, transparent 1px),
        linear-gradient(90deg, var(--line) 1px, transparent 1px),
        radial-gradient(circle at 24% 18%, rgba(127, 255, 212, 0.36), transparent 28%),
        radial-gradient(circle at 82% 72%, rgba(10, 63, 52, 0.2), transparent 30%),
        linear-gradient(135deg, #f8faf6, #edf3ee 45%, #f7f8f5);
      background-size: 30px 30px, 30px 30px, auto, auto, auto;
      overflow: hidden;
      padding: 24px;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: -20%;
      pointer-events: none;
      background: conic-gradient(from 180deg, transparent, rgba(127, 255, 212, 0.14), transparent, rgba(10, 63, 52, 0.08), transparent);
      animation: drift 18s linear infinite;
      filter: blur(22px);
    }

    body::after {
      animation-duration: 26s;
      animation-direction: reverse;
      opacity: 0.55;
    }

    @keyframes drift {
      to { transform: rotate(360deg); }
    }

    .player {
      width: min(448px, 100%);
      border: 1px solid rgba(127, 255, 212, 0.34);
      background: linear-gradient(145deg, var(--card), rgba(255, 255, 255, 0.38));
      backdrop-filter: blur(24px) saturate(1.35);
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255, 255, 255, 0.72);
      padding: 22px;
      position: relative;
      isolation: isolate;
      clip-path: polygon(0 0, calc(100% - 26px) 0, 100% 26px, 100% 100%, 26px 100%, 0 calc(100% - 26px));
    }

    .player::before {
      content: "";
      position: absolute;
      inset: 10px;
      border: 1px dashed rgba(10, 63, 52, 0.22);
      clip-path: inherit;
      pointer-events: none;
      z-index: -1;
    }

    .player::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 0 42%, rgba(127, 255, 212, 0.22) 50%, transparent 58% 100%);
      transform: translateX(-120%);
      animation: scan 4.5s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes scan {
      0%, 38% { transform: translateX(-120%); }
      70%, 100% { transform: translateX(120%); }
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      position: relative;
      z-index: 1;
    }

    .eyebrow {
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .status {
      font-size: 11px;
      border: 1px solid rgba(127, 255, 212, 0.44);
      padding: 7px 9px;
      color: var(--accent);
      background: rgba(255, 255, 255, 0.42);
      box-shadow: 0 0 24px rgba(127, 255, 212, 0.28);
    }

    .cover {
      aspect-ratio: 1 / 0.72;
      border: 1px solid rgba(10, 63, 52, 0.16);
      display: grid;
      place-items: center;
      margin-bottom: 20px;
      background:
        linear-gradient(135deg, rgba(127, 255, 212, 0.2), transparent 36%),
        radial-gradient(circle, transparent 0 40%, rgba(10, 63, 52, 0.05) 41% 42%, transparent 43%),
        repeating-linear-gradient(90deg, transparent 0 17px, rgba(10, 63, 52, 0.08) 18px),
        rgba(238, 246, 239, 0.76);
      overflow: hidden;
      position: relative;
      z-index: 1;
      clip-path: polygon(0 0, calc(100% - 18px) 0, 100% 18px, 100% 100%, 18px 100%, 0 calc(100% - 18px));
    }

    .cover::before {
      content: "AUDIO SPECTRUM // 2088";
      position: absolute;
      left: 14px;
      top: 12px;
      font-size: 10px;
      letter-spacing: 0.18em;
      color: rgba(10, 63, 52, 0.55);
    }

    .cover::after {
      content: "";
      position: absolute;
      inset: 18px;
      border: 1px solid rgba(127, 255, 212, 0.34);
      box-shadow: inset 0 0 38px rgba(127, 255, 212, 0.18);
    }

    .disc {
      width: 138px;
      height: 138px;
      border-radius: 50%;
      border: 1px solid rgba(127, 255, 212, 0.65);
      background:
        radial-gradient(circle, #f7f8f5 0 10px, var(--neon) 11px 15px, transparent 16px),
        repeating-radial-gradient(circle, rgba(255, 255, 255, 0.5) 0 2px, transparent 3px 9px),
        conic-gradient(from 140deg, rgba(10, 63, 52, 0.96), rgba(127, 255, 212, 0.16), rgba(10, 63, 52, 0.94));
      box-shadow: 0 0 44px rgba(127, 255, 212, 0.34);
      animation: spin 8s linear infinite;
      animation-play-state: paused;
    }

    .player.playing .disc { animation-play-state: running; }

    @keyframes spin { to { transform: rotate(360deg); } }

    .meta { position: relative; z-index: 1; }

    h1 {
      margin: 0 0 7px;
      font-size: 31px;
      line-height: 1.02;
      letter-spacing: -0.055em;
    }

    .artist {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 14px;
    }

    .progress-wrap {
      display: grid;
      gap: 8px;
      margin-bottom: 18px;
      position: relative;
      z-index: 1;
    }

    .time {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: 12px;
      font-variant-numeric: tabular-nums;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 68px 1fr;
      align-items: center;
      gap: 10px;
      position: relative;
      z-index: 1;
    }

    button {
      border: 1px solid rgba(10, 63, 52, 0.16);
      background: rgba(255, 255, 255, 0.48);
      color: var(--ink);
      min-height: 44px;
      cursor: pointer;
      font: inherit;
      letter-spacing: 0.04em;
      transition: transform 0.16s ease, background 0.16s ease, border-color 0.16s ease, box-shadow 0.16s ease;
      clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px));
    }

    button:hover {
      transform: translateY(-1px);
      background: #fff;
      border-color: rgba(127, 255, 212, 0.58);
      box-shadow: 0 0 22px rgba(127, 255, 212, 0.22);
    }

    .play {
      width: 68px;
      height: 68px;
      border-radius: 999px;
      clip-path: none;
      background: var(--accent);
      color: white;
      font-size: 23px;
      box-shadow: 0 18px 40px rgba(10, 63, 52, 0.25), 0 0 34px rgba(127, 255, 212, 0.35);
    }

    .loader {
      margin-top: 18px;
      padding: 13px;
      border: 1px solid rgba(127, 255, 212, 0.32);
      background: rgba(255, 255, 255, 0.24);
      position: relative;
      z-index: 1;
    }

    .loader p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .loader code {
      color: var(--accent);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }

    .playlist {
      margin-top: 14px;
      border-top: 1px solid var(--line);
      padding-top: 14px;
      display: grid;
      gap: 8px;
      position: relative;
      z-index: 1;
      max-height: 210px;
      overflow: auto;
    }

    .track {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 11px;
      border: 1px solid transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 13px;
      background: rgba(255, 255, 255, 0.2);
    }

    .track.active {
      color: var(--accent);
      border-color: rgba(127, 255, 212, 0.42);
      background: rgba(185, 255, 233, 0.34);
      box-shadow: inset 3px 0 0 var(--accent), 0 0 24px rgba(127, 255, 212, 0.16);
    }

    @media (max-width: 420px) {
      .player { padding: 18px; }
      h1 { font-size: 25px; }
    }
  </style>
</head>
<body>
  <main class="player" id="player">
    <div class="topbar">
      <div class="eyebrow">STNS FUTURE AUDIO</div>
      <div class="status" id="status">PAUSED</div>
    </div>

    <section class="cover" aria-label="album cover">
      <div class="disc"></div>
    </section>

    <section class="meta">
      <h1 id="title">Blueprint Pulse</h1>
      <p class="artist" id="artist">Grid Lab</p>
    </section>

    <section class="progress-wrap">
      <input id="progress" type="range" min="0" max="100" value="0" aria-label="progress" />
      <div class="time">
        <span id="current">0:00</span>
        <span id="duration">0:00</span>
      </div>
    </section>

    <section class="controls">
      <button id="prev" type="button">PREV</button>
      <button id="play" class="play" type="button" aria-label="play">▶</button>
      <button id="next" type="button">NEXT</button>
    </section>

    <section class="loader">
      <p>GitHub 저장소의 같은 폴더를 조회해서 <code>.mp3</code> 파일을 자동으로 불러옵니다.</p>
    </section>

    <section class="playlist" id="playlist"></section>

    <audio id="audio"></audio>
  </main>

  <script>
    let tracks = [];

    const player = document.getElementById('player');
    const audio = document.getElementById('audio');
    const title = document.getElementById('title');
    const artist = document.getElementById('artist');
    const playBtn = document.getElementById('play');
    const prevBtn = document.getElementById('prev');
    const nextBtn = document.getElementById('next');
    const progress = document.getElementById('progress');
    const current = document.getElementById('current');
    const duration = document.getElementById('duration');
    const status = document.getElementById('status');
    const playlist = document.getElementById('playlist');

    let trackIndex = 0;

    function formatTime(seconds) {
      if (Number.isNaN(seconds)) return '0:00';
      const min = Math.floor(seconds / 60);
      const sec = Math.floor(seconds % 60).toString().padStart(2, '0');
      return `${min}:${sec}`;
    }

    function loadTrack(index) {
      if (!tracks.length) return;
      const track = tracks[index];
      title.textContent = track.title;
      artist.textContent = track.artist;
      audio.src = track.src;
      progress.value = 0;
      current.textContent = '0:00';
      duration.textContent = '0:00';
      renderPlaylist();
    }

    function renderPlaylist() {
      if (!tracks.length) {
        playlist.innerHTML = '<div class="track">오디오 파일이 없습니다.</div>';
        return;
      }

      playlist.innerHTML = tracks.map((track, index) => `
        <div class="track ${index === trackIndex ? 'active' : ''}" data-index="${index}">
          <span>${String(index + 1).padStart(2, '0')} · ${track.title}</span>
          <span>${track.artist}</span>
        </div>
      `).join('');
    }

    function playTrack() {
      audio.play();
      player.classList.add('playing');
      playBtn.textContent = 'Ⅱ';
      status.textContent = 'PLAYING';
    }

    function pauseTrack() {
      audio.pause();
      player.classList.remove('playing');
      playBtn.textContent = '▶';
      status.textContent = 'PAUSED';
    }

    function togglePlay() {
      audio.paused ? playTrack() : pauseTrack();
    }

    function nextTrack() {
      trackIndex = (trackIndex + 1) % tracks.length;
      loadTrack(trackIndex);
      playTrack();
    }

    function prevTrack() {
      trackIndex = (trackIndex - 1 + tracks.length) % tracks.length;
      loadTrack(trackIndex);
      playTrack();
    }

    playBtn.addEventListener('click', togglePlay);
    nextBtn.addEventListener('click', nextTrack);
    prevBtn.addEventListener('click', prevTrack);

    audio.addEventListener('loadedmetadata', () => {
      duration.textContent = formatTime(audio.duration);
    });

    audio.addEventListener('timeupdate', () => {
      const percent = (audio.currentTime / audio.duration) * 100 || 0;
      progress.value = percent;
      current.textContent = formatTime(audio.currentTime);
    });

    progress.addEventListener('input', () => {
      audio.currentTime = (progress.value / 100) * audio.duration;
    });

    audio.addEventListener('ended', nextTrack);

    playlist.addEventListener('click', (event) => {
      const item = event.target.closest('.track');
      if (!item || item.dataset.index === undefined) return;
      trackIndex = Number(item.dataset.index);
      loadTrack(trackIndex);
      playTrack();
    });

    async function loadMp3FilesFromGitHubFolder() {
      try {
        const repo = 'lee1431/nr';
        const branch = 'main';

        const pagePath = window.location.pathname.split('/').slice(0, -1).join('/');
        const repoName = repo.split('/')[1];        
        const folderPath = 'assets/muz';

        const apiUrl = `https://api.github.com/repos/${repo}/contents/${folderPath}?ref=${branch}`;
        const response = await fetch(apiUrl, { cache: 'no-store' });
        if (!response.ok) throw new Error('GitHub folder list failed');

        const files = await response.json();
        const mp3Files = files
          .filter(file => file.type === 'file' && file.name.toLowerCase().endsWith('.mp3'))
          .sort((a, b) => a.name.localeCompare(b.name, 'ko'));

        tracks = mp3Files.map(file => ({
          title: decodeURIComponent(file.name.replace(/\.mp3$/i, '')),
          artist: 'Master BS',
          src: `../assets/muz/${encodeURIComponent(file.name)}`
        }));

        if (!tracks.length) throw new Error('No mp3 files');

        trackIndex = 0;
        status.textContent = `${tracks.length} FILES`;
        loadTrack(trackIndex);
      } catch (error) {
        tracks = [];
        status.textContent = 'NO MP3';
        title.textContent = 'No MP3 Files';
        artist.textContent = 'GitHub repo 설정 또는 mp3 파일을 확인하세요';
        playlist.innerHTML = '<div class="track">같은 폴더에서 .mp3 파일을 찾지 못했습니다.</div>';
        console.error(error);
      }
    }

    loadMp3FilesFromGitHubFolder();
  </script>
</body>
</html>
