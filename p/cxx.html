<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Future Grid Music Player - Dark Neon</title>
  <style>
    :root {
      /* 심연의 어둠과 사이버틱한 네온 블루/시안 컬러로 재구성 */
      --bg: #09090b;
      --ink: #fafafa;
      --muted: #a1a1aa;
      --line: rgba(255, 255, 255, 0.06);
      --accent: #06b6d4; /* Cyan */
      --neon: #3b82f6; /* Blue */
      --card: rgba(24, 24, 27, 0.55);
      --shadow: 0 32px 80px rgba(0, 0, 0, 0.8);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      color: var(--ink);
      background:
        linear-gradient(var(--line) 1px, transparent 1px),
        linear-gradient(90deg, var(--line) 1px, transparent 1px),
        radial-gradient(circle at 15% 50%, rgba(6, 182, 212, 0.12), transparent 40%),
        radial-gradient(circle at 85% 30%, rgba(59, 130, 246, 0.12), transparent 40%),
        var(--bg);
      background-size: 30px 30px, 30px 30px, auto, auto, auto;
      padding: 24px;
    }
    .app {
      width: min(1180px, 100%);
      display: grid;
      grid-template-columns: 360px minmax(360px, 480px);
      gap: 18px;
      align-items: start;
    }
    .panel,
    .player {
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: linear-gradient(145deg, var(--card), rgba(39, 39, 42, 0.4));
      backdrop-filter: blur(24px) saturate(1.5);
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255, 255, 255, 0.05);
      position: relative;
      clip-path: polygon(0 0, calc(100% - 22px) 0, 100% 22px, 100% 100%, 22px 100%, 0 calc(100% - 22px));
    }
    .panel { padding: 18px; }
    .player { padding: 22px; }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }
    .eyebrow {
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .status {
      font-size: 11px;
      border: 1px solid rgba(6, 182, 212, 0.4);
      padding: 7px 9px;
      color: var(--accent);
      background: rgba(0, 0, 0, 0.4);
      box-shadow: 0 0 15px rgba(6, 182, 212, 0.2);
      white-space: nowrap;
    }
    
    .library-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      padding: 0 4px;
    }
    .select-all-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      letter-spacing: 0.16em;
      color: var(--accent);
      cursor: pointer;
    }
    .select-all-label input[type="checkbox"], 
    .track-select {
      accent-color: var(--accent);
      cursor: pointer;
    }
    .library-actions button {
      min-height: 28px;
      font-size: 10px;
      padding: 0 10px;
    }

    .library {
      display: grid;
      gap: 8px;
      max-height: 630px;
      overflow: auto;
      padding-right: 4px;
    }
    
    /* 스크롤바 다크 테마 적용 */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.2); }
    ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

    .cover {
      aspect-ratio: 1 / 0.72;
      border: 1px solid rgba(255, 255, 255, 0.08);
      display: grid;
      place-items: center;
      margin-bottom: 20px;
      background:
        linear-gradient(135deg, rgba(6, 182, 212, 0.1), transparent 40%),
        rgba(10, 10, 12, 0.8);
      overflow: hidden;
      position: relative;
      clip-path: polygon(0 0, calc(100% - 18px) 0, 100% 18px, 100% 100%, 18px 100%, 0 calc(100% - 18px));
    }
    .cover::before {
      content: "AUDIO SPECTRUM // 2088";
      position: absolute;
      left: 14px;
      top: 12px;
      font-size: 10px;
      letter-spacing: 0.18em;
      color: rgba(255, 255, 255, 0.3);
    }
    .disc {
      width: 138px;
      height: 138px;
      border-radius: 50%;
      border: 1px solid rgba(6, 182, 212, 0.5);
      background:
        radial-gradient(circle, #18181b 0 10px, var(--neon) 11px 15px, transparent 16px),
        repeating-radial-gradient(circle, rgba(255, 255, 255, 0.1) 0 2px, transparent 3px 9px),
        conic-gradient(from 140deg, #111, rgba(6, 182, 212, 0.25), #111);
      box-shadow: 0 0 35px rgba(6, 182, 212, 0.2);
      animation: spin 8s linear infinite;
      animation-play-state: paused;
    }
    .playing .disc { animation-play-state: running; }
    @keyframes spin { to { transform: rotate(360deg); } }

    h1 {
      margin: 0 0 7px;
      font-size: 31px;
      line-height: 1.02;
      letter-spacing: -0.055em;
    }
    .artist {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 14px;
    }
    .progress-wrap { display: grid; gap: 8px; margin-bottom: 14px; }
    .volume-wrap {
      display: grid;
      grid-template-columns: 40px 1fr;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      color: var(--muted);
      font-size: 12px;
    }
    .volume-wrap input {
      width: 100%;
      accent-color: var(--accent);
      cursor: pointer;
    }
    .time {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: 12px;
      font-variant-numeric: tabular-nums;
    }
    input[type="range"] { width: 100%; accent-color: var(--accent); cursor: pointer; }
    
    .controls {
      display: grid;
      grid-template-columns: 1fr 68px 1fr;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .modes {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 14px;
    }
    button {
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(0, 0, 0, 0.3);
      color: var(--ink);
      min-height: 42px;
      cursor: pointer;
      font: inherit;
      letter-spacing: 0.04em;
      transition: all 0.2s ease;
      clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px));
    }
    button:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(6, 182, 212, 0.5);
      box-shadow: 0 0 15px rgba(6, 182, 212, 0.15);
    }
    button.active {
      color: var(--accent);
      border-color: var(--accent);
      background: rgba(6, 182, 212, 0.1);
      box-shadow: inset 3px 0 0 var(--accent), 0 0 20px rgba(6, 182, 212, 0.15);
    }
    .play {
      width: 68px;
      height: 68px;
      border-radius: 999px;
      clip-path: none;
      background: var(--accent);
      color: #000;
      font-size: 23px;
      font-weight: bold;
      border: none;
      box-shadow: 0 10px 30px rgba(6, 182, 212, 0.25), 0 0 20px rgba(6, 182, 212, 0.3);
    }
    .play:hover {
      background: #22d3ee;
      box-shadow: 0 10px 35px rgba(34, 211, 238, 0.4), 0 0 25px rgba(34, 211, 238, 0.5);
    }
    
    .loader {
      padding: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(0, 0, 0, 0.2);
      margin-bottom: 14px;
    }
    .loader p { margin: 0; color: var(--muted); font-size: 12px; line-height: 1.5; }
    .loader code { color: var(--accent); font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    
    .queue-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 14px 0 8px;
      color: var(--accent);
      font-size: 11px;
      letter-spacing: 0.16em;
    }
    .queue-title button { min-height: 30px; font-size: 11px; padding: 0 10px; }
    .queue {
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      padding-top: 10px;
      display: grid;
      gap: 8px;
      max-height: 220px;
      overflow: auto;
    }
    
    .item {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 10px;
      border: 1px solid transparent;
      color: var(--muted);
      font-size: 13px;
      background: rgba(0, 0, 0, 0.2);
      user-select: none;
      transition: background 0.2s, border-color 0.2s;
    }
    
    .library .item { cursor: pointer; }
    .library .item.selected {
      background: rgba(6, 182, 212, 0.08);
      border-color: rgba(6, 182, 212, 0.3);
      box-shadow: inset 3px 0 0 var(--accent);
      color: var(--ink);
    }
    .library .item:hover { background: rgba(255, 255, 255, 0.05); }

    .queue .item { grid-template-columns: 1fr auto; } 
    .queue .item.active {
      color: var(--accent);
      border-color: rgba(6, 182, 212, 0.3);
      background: rgba(6, 182, 212, 0.1);
      box-shadow: inset 3px 0 0 var(--accent), 0 0 20px rgba(6, 182, 212, 0.1);
    }

    .song-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; pointer-events: none; }
    .song-sub { display: block; margin-top: 4px; font-size: 11px; color: var(--muted); }
    .mini-actions { display: flex; gap: 6px; }
    .mini-actions button { min-height: 30px; padding: 0 9px; font-size: 11px; }

    @media (max-width: 880px) {
      .app { grid-template-columns: 1fr; }
      .library { max-height: 260px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <aside class="panel">
      <div class="topbar">
        <div class="eyebrow">ALL TRACKS</div>
        <div class="status" id="libraryCount">LOADING</div>
      </div>
      <section class="loader">
        <p>GitHub <code>main/assets/muz</code> 폴더의 <code>.mp3</code> 파일을 자동 조회합니다. 리스트 클릭, <code>Shift</code>/<code>Ctrl</code> 로 다중 선택이 가능합니다.</p>
      </section>
      
      <div class="library-actions">
        <label class="select-all-label">
          <input type="checkbox" id="selectAll">
          SELECT ALL
        </label>
        <button id="addSelected" type="button">ADD SELECTED</button>
      </div>

      <section class="library" id="library"></section>
    </aside>

    <section class="player" id="player">
      <div class="topbar">
        <div class="eyebrow">STNS FUTURE AUDIO</div>
        <div class="status" id="status">READY</div>
      </div>

      <section class="cover" aria-label="album cover">
        <div class="disc"></div>
      </section>

      <section class="meta">
        <h1 id="title">No Track</h1>
        <p class="artist" id="artist">큐에 음악을 추가하세요</p>
      </section>

      <section class="progress-wrap">
        <input id="progress" type="range" min="0" max="100" value="0" aria-label="progress" />
        <div class="time">
          <span id="current">0:00</span>
          <span id="duration">0:00</span>
        </div>
      </section>

      <section class="volume-wrap">
        <label>VOL</label>
        <input id="volume" type="range" min="0" max="1" step="0.01" value="1" />
      </section>

      <section class="controls">
        <button id="prev" type="button">PREV</button>
        <button id="play" class="play" type="button" aria-label="play">▶</button>
        <button id="next" type="button">NEXT</button>
      </section>

      <section class="modes">
        <button id="modeAll" class="active" type="button">ALL</button>
        <button id="modeOne" type="button">ONE</button>
        <button id="modeShuffle" type="button">SHUFFLE</button>
      </section>

      <div class="queue-title">
        <span>PLAY QUEUE</span>
        <button id="clearQueue" type="button">CLEAR</button>
      </div>
      <section class="queue" id="queue"></section>

      <audio id="audio"></audio>
    </section>
  </main>

  <script>
    const repo = 'lee1431/nr';
    const branch = 'main';
    const folderPath = 'assets/muz';

    let libraryTracks = [];
    let queueTracks = [];
    let queueIndex = 0;
    let playMode = 'all';
    
    let selectedLibraryIndices = new Set();
    let lastSelectedIndex = -1;

    const player = document.getElementById('player');
    const audio = document.getElementById('audio');
    const title = document.getElementById('title');
    const artist = document.getElementById('artist');
    const playBtn = document.getElementById('play');
    const prevBtn = document.getElementById('prev');
    const nextBtn = document.getElementById('next');
    const progress = document.getElementById('progress');
    const volume = document.getElementById('volume');
    const current = document.getElementById('current');
    const duration = document.getElementById('duration');
    const status = document.getElementById('status');
    const library = document.getElementById('library');
    const queue = document.getElementById('queue');
    const libraryCount = document.getElementById('libraryCount');
    const modeAll = document.getElementById('modeAll');
    const modeOne = document.getElementById('modeOne');
    const modeShuffle = document.getElementById('modeShuffle');
    const clearQueue = document.getElementById('clearQueue');
    
    const selectAllCheckbox = document.getElementById('selectAll');
    const addSelectedBtn = document.getElementById('addSelected');

    function formatTime(seconds) {
      if (Number.isNaN(seconds) || !Number.isFinite(seconds)) return '0:00';
      const min = Math.floor(seconds / 60);
      const sec = Math.floor(seconds % 60).toString().padStart(2, '0');
      return `${min}:${sec}`;
    }

    function renderLibrary() {
      libraryCount.textContent = `${libraryTracks.length} FILES`;
      library.innerHTML = libraryTracks.map((track, index) => {
        const isSelected = selectedLibraryIndices.has(index);
        return `
        <div class="item ${isSelected ? 'selected' : ''}" data-index="${index}">
          <input type="checkbox" class="track-select" tabindex="-1" ${isSelected ? 'checked' : ''} style="pointer-events: none;">
          <div class="song-name">
            ${String(index + 1).padStart(2, '0')} · ${track.title}
            <span class="song-sub">${track.artist}</span>
          </div>
          <div class="mini-actions">
            <button type="button" data-add="${index}">ADD</button>
          </div>
        </div>
      `}).join('');
      updateSelectAllCheckbox();
    }

    function updateLibrarySelectionUI() {
      const items = library.querySelectorAll('.item');
      items.forEach((item, index) => {
        const isSelected = selectedLibraryIndices.has(index);
        item.classList.toggle('selected', isSelected);
        const checkbox = item.querySelector('.track-select');
        if (checkbox) checkbox.checked = isSelected;
      });
      updateSelectAllCheckbox();
    }

    function updateSelectAllCheckbox() {
      if (!libraryTracks.length) return;
      selectAllCheckbox.checked = selectedLibraryIndices.size === libraryTracks.length;
      selectAllCheckbox.indeterminate = selectedLibraryIndices.size > 0 && selectedLibraryIndices.size < libraryTracks.length;
    }

    function renderQueue() {
      if (!queueTracks.length) {
        queue.innerHTML = '<div class="item" style="grid-template-columns: 1fr;">재생할 음악을 좌측 목록에서 추가하세요.</div>';
        return;
      }

      queue.innerHTML = queueTracks.map((track, index) => `
        <div class="item ${index === queueIndex ? 'active' : ''}">
          <div class="song-name" data-play="${index}" style="pointer-events: auto; cursor: pointer;">
            ${String(index + 1).padStart(2, '0')} · ${track.title}
            <span class="song-sub">${track.artist}</span>
          </div>
          <div class="mini-actions">
            <button type="button" data-play="${index}">PLAY</button>
            <button type="button" data-remove="${index}">DEL</button>
          </div>
        </div>
      `).join('');
    }

    function setMode(mode) {
      playMode = mode;
      modeAll.classList.toggle('active', mode === 'all');
      modeOne.classList.toggle('active', mode === 'one');
      modeShuffle.classList.toggle('active', mode === 'shuffle');
    }

    function loadQueueTrack(index) {
      if (!queueTracks.length) {
        pauseTrack();
        title.textContent = 'No Track';
        artist.textContent = '큐에 음악을 추가하세요';
        audio.removeAttribute('src');
        progress.value = 0;
        current.textContent = '0:00';
        duration.textContent = '0:00';
        renderQueue();
        return;
      }

      queueIndex = Math.max(0, Math.min(index, queueTracks.length - 1));
      const track = queueTracks[queueIndex];
      title.textContent = track.title;
      artist.textContent = track.artist;
      audio.src = track.src;
      progress.value = 0;
      current.textContent = '0:00';
      duration.textContent = '0:00';
      renderQueue();
    }

    function playTrack() {
      if (!queueTracks.length) return;
      audio.play();
      player.classList.add('playing');
      playBtn.textContent = 'Ⅱ';
      status.textContent = 'PLAYING';
    }

    function pauseTrack() {
      audio.pause();
      player.classList.remove('playing');
      playBtn.textContent = '▶';
      status.textContent = queueTracks.length ? 'PAUSED' : 'READY';
    }

    function togglePlay() {
      if (!queueTracks.length) return;
      audio.paused ? playTrack() : pauseTrack();
    }

    function getRandomQueueIndex() {
      if (queueTracks.length <= 1) return queueIndex;
      let next = queueIndex;
      while (next === queueIndex) {
        next = Math.floor(Math.random() * queueTracks.length);
      }
      return next;
    }

    function nextTrack() {
      if (!queueTracks.length) return;
      if (playMode === 'one') {
        audio.currentTime = 0;
        playTrack();
        return;
      }
      let nextIndex;
      if (playMode === 'shuffle') {
        if (queueTracks.length === 1) {
          nextIndex = queueIndex;
        } else {
          do {
            nextIndex = Math.floor(Math.random() * queueTracks.length);
          } while (nextIndex === queueIndex);
        }
      } else {
        nextIndex = (queueIndex + 1) % queueTracks.length;
      }
      loadQueueTrack(nextIndex);
      playTrack();
    }

    function prevTrack() {
      if (!queueTracks.length) return;
      const prevIndex = playMode === 'shuffle'
        ? getRandomQueueIndex()
        : (queueIndex - 1 + queueTracks.length) % queueTracks.length;

      loadQueueTrack(prevIndex);
      playTrack();
    }

    function addToQueue(track) {
      queueTracks.push(track);
      if (queueTracks.length === 1) loadQueueTrack(0);
      renderQueue();
    }

    function removeFromQueue(index) {
      const wasPlaying = !audio.paused;
      const isCurrentTrack = index === queueIndex;

      queueTracks.splice(index, 1);

      if (!queueTracks.length) {
        loadQueueTrack(0);
        return;
      }
      if (index < queueIndex) {
        queueIndex -= 1;
        renderQueue();
        return;
      }
      if (!isCurrentTrack) {
        renderQueue();
        return;
      }
      if (queueIndex >= queueTracks.length) queueIndex = 0;
      loadQueueTrack(queueIndex);
      if (wasPlaying) playTrack();
    }

    async function loadMp3FilesFromGitHubFolder() {
      try {
        const apiUrl = `https://api.github.com/repos/${repo}/contents/${folderPath}?ref=${branch}`;
        const response = await fetch(apiUrl, { cache: 'no-store' });
        if (!response.ok) throw new Error('GitHub folder list failed');

        const files = await response.json();
        const mp3Files = files
          .filter(file => file.type === 'file' && file.name.toLowerCase().endsWith('.mp3'))
          .sort((a, b) => a.name.localeCompare(b.name, 'ko'));

        libraryTracks = mp3Files.map(file => ({
          title: decodeURIComponent(file.name.replace(/\.mp3$/i, '')),
          artist: 'GitHub Folder',
          src: file.download_url
        }));

        renderLibrary();
        if (!libraryTracks.length) throw new Error('No mp3 files');
      } catch (error) {
        libraryTracks = [];
        libraryCount.textContent = 'NO MP3';
        library.innerHTML = '<div class="item" style="grid-template-columns: 1fr;">main/assets/muz 폴더에서 .mp3 파일을 찾지 못했습니다.</div>';
        status.textContent = 'ERROR';
        console.error(error);
      }
    }

    library.addEventListener('click', (event) => {
      const addButton = event.target.closest('[data-add]');
      if (addButton) {
        const index = Number(addButton.dataset.add);
        addToQueue(libraryTracks[index]);
        return;
      }

      const item = event.target.closest('.item');
      if (!item) return;

      const index = Number(item.dataset.index);

      if (event.shiftKey && lastSelectedIndex !== -1) {
        const start = Math.min(lastSelectedIndex, index);
        const end = Math.max(lastSelectedIndex, index);
        
        if (!event.ctrlKey && !event.metaKey) {
          selectedLibraryIndices.clear();
        }
        for (let i = start; i <= end; i++) {
          selectedLibraryIndices.add(i);
        }
      } else if (event.ctrlKey || event.metaKey) {
        if (selectedLibraryIndices.has(index)) {
          selectedLibraryIndices.delete(index);
        } else {
          selectedLibraryIndices.add(index);
        }
        lastSelectedIndex = index;
      } else {
        if (selectedLibraryIndices.size === 1 && selectedLibraryIndices.has(index)) {
          selectedLibraryIndices.clear();
        } else {
          selectedLibraryIndices.clear();
          selectedLibraryIndices.add(index);
        }
        lastSelectedIndex = index;
      }

      updateLibrarySelectionUI();
      window.getSelection().removeAllRanges();
    });

    selectAllCheckbox.addEventListener('change', (e) => {
      if (e.target.checked) {
        libraryTracks.forEach((_, idx) => selectedLibraryIndices.add(idx));
      } else {
        selectedLibraryIndices.clear();
      }
      updateLibrarySelectionUI();
    });

    addSelectedBtn.addEventListener('click', () => {
      if (selectedLibraryIndices.size === 0) return;
      
      const wasEmpty = queueTracks.length === 0;
      const sortedIndices = Array.from(selectedLibraryIndices).sort((a, b) => a - b);
      
      sortedIndices.forEach(idx => {
        queueTracks.push(libraryTracks[idx]);
      });

      if (wasEmpty && queueTracks.length > 0) {
        loadQueueTrack(0);
      }
      renderQueue();

      selectedLibraryIndices.clear();
      updateLibrarySelectionUI();
    });

    queue.addEventListener('click', (event) => {
      const playTarget = event.target.closest('[data-play]');
      const removeTarget = event.target.closest('[data-remove]');

      if (removeTarget) {
        removeFromQueue(Number(removeTarget.dataset.remove));
        return;
      }
      if (playTarget) {
        loadQueueTrack(Number(playTarget.dataset.play));
        playTrack();
      }
    });

    playBtn.addEventListener('click', togglePlay);
    nextBtn.addEventListener('click', nextTrack);
    prevBtn.addEventListener('click', prevTrack);
    modeAll.addEventListener('click', () => setMode('all'));
    modeOne.addEventListener('click', () => setMode('one'));
    modeShuffle.addEventListener('click', () => setMode('shuffle'));
    
    clearQueue.addEventListener('click', () => {
      queueTracks = [];
      queueIndex = 0;
      loadQueueTrack(0);
    });

    audio.addEventListener('loadedmetadata', () => {
      duration.textContent = formatTime(audio.duration);
    });

    audio.addEventListener('timeupdate', () => {
      const percent = (audio.currentTime / audio.duration) * 100 || 0;
      progress.value = percent;
      current.textContent = formatTime(audio.currentTime);
    });

    progress.addEventListener('input', () => {
      if (!audio.duration) return;
      audio.currentTime = (progress.value / 100) * audio.duration;
    });

    volume.addEventListener('input', () => {
      audio.volume = volume.value;
    });

    audio.addEventListener('ended', nextTrack);

    setMode('all');
    renderQueue();
    loadMp3FilesFromGitHubFolder();
  </script>
</body>
</html>
