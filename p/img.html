<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STANCE GALLERY</title>
  <style>
    :root {
      --bg: #f4f4f1;
      --line: rgba(0, 0, 0, 0.08);
      --text: #111;
      --muted: #666;
      --point: #1d3b34;
      --white: #fff;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
      --radius: 16px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Pretendard, "Apple SD Gothic Neo", sans-serif;
      color: var(--text);
      background:
        linear-gradient(rgba(0, 0, 0, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 0, 0, 0.025) 1px, transparent 1px),
        radial-gradient(circle at top left, rgba(29, 59, 52, 0.07), transparent 26%),
        var(--bg);
      background-size: 30px 30px, 30px 30px, auto, auto;
    }

    .wrap {
      max-width: 1320px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }

    .hero {
      margin-bottom: 28px;
      padding: 24px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid var(--line);
      border-radius: 24px;
      backdrop-filter: blur(8px);
      box-shadow: var(--shadow);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--point);
      margin-bottom: 12px;
    }

    .eyebrow::before {
      content: "";
      width: 26px;
      height: 1px;
      background: var(--point);
      display: block;
    }

    h1 {
      font-size: clamp(34px, 6vw, 72px);
      line-height: 0.95;
      letter-spacing: -0.05em;
      font-weight: 500;
      margin-bottom: 12px;
    }

    .hero-bottom {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      align-items: end;
      flex-wrap: wrap;
    }

    .hero p {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
      max-width: 720px;
    }

    .meta-info {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .count {
      font-size: 13px;
      color: var(--muted);
    }

    .view-switch {
      display: inline-flex;
      gap: 8px;
    }

    .view-btn {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.85);
      color: var(--text);
      padding: 9px 14px;
      border-radius: 999px;
      font-size: 12px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .view-btn.active {
      background: var(--point);
      color: var(--white);
      border-color: var(--point);
    }

    .gallery.grid-view {
      column-count: 3;
      column-gap: 16px;
    }

    .gallery.list-view {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .item {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: #ddd;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04);
      cursor: pointer;
      break-inside: avoid;
      margin-bottom: 16px;
      transition: transform 0.35s ease, box-shadow 0.35s ease, border-color 0.35s ease;
    }

    .item:hover {
      transform: translateY(-4px);
      box-shadow: 0 18px 38px rgba(0, 0, 0, 0.08);
      border-color: rgba(29, 59, 52, 0.18);
    }

    .item img {
      width: 100%;
      display: block;
      object-fit: cover;
      background: #e9e9e9;
    }

    .item::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.5), transparent 46%);
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }

    .item:hover::before {
      opacity: 1;
    }

    .overlay {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 14px;
      color: var(--white);
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: end;
      opacity: 0;
      transform: translateY(8px);
      transition: 0.3s ease;
      pointer-events: none;
    }

    .item:hover .overlay {
      opacity: 1;
      transform: translateY(0);
    }

    .overlay-title {
      font-size: 13px;
      font-weight: 500;
      word-break: break-all;
    }

    .overlay-tag {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.82;
      white-space: nowrap;
    }

    .list-view .item {
      display: grid;
      grid-template-columns: 260px 1fr;
      margin-bottom: 0;
      min-height: 180px;
    }

    .list-view .item img {
      height: 100%;
    }

    .list-view .item::before,
    .list-view .overlay {
      display: none;
    }

    .list-meta {
      display: none;
      padding: 18px;
      background: rgba(255, 255, 255, 0.84);
    }

    .list-view .list-meta {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 14px;
    }

    .list-folder {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--point);
    }

    .list-title {
      font-size: 18px;
      line-height: 1.35;
      word-break: break-all;
    }

    .list-desc {
      font-size: 13px;
      line-height: 1.7;
      color: var(--muted);
    }

    .empty,
    .loading,
    .error-box {
      padding: 60px 20px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.55);
    }

    .error-box {
      color: #8a1f1f;
    }

    #modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.86);
      backdrop-filter: blur(10px);
      justify-content: center;
      align-items: center;
      z-index: 1000;
      padding: 20px;
    }

    .modal-inner {
      position: relative;
      width: min(1100px, 100%);
      padding: 14px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    #modal-img {
      width: 100%;
      max-height: 82vh;
      object-fit: contain;
      display: block;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.03);
    }

    .close-btn {
      position: absolute;
      top: -12px;
      right: -2px;
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.16);
      color: #fff;
      font-size: 24px;
      cursor: pointer;
      border: 1px solid rgba(255, 255, 255, 0.14);
      backdrop-filter: blur(8px);
    }

    @media (max-width: 1024px) {
      .gallery.grid-view {
        column-count: 2;
      }
    }

    @media (max-width: 768px) {
      .wrap {
        padding: 20px 16px 44px;
      }

      .hero {
        padding: 20px 18px;
      }

      .list-view .item {
        grid-template-columns: 1fr;
        min-height: auto;
      }

      .list-view .item img {
        max-height: 340px;
      }
    }

    @media (max-width: 560px) {
      .gallery.grid-view {
        column-count: 1;
      }

      h1 {
        font-size: 42px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="eyebrow">Visual Archive</div>
      <h1><span id="folderTitle">GALLERY</span><br />ARCHIVE</h1>
      <div class="hero-bottom">
        <p>
          STANCE 파트너 갤러리 아카이브. 최신 업로드 기준으로 이미지를 탐색하고,
          그리드 뷰와 리스트 뷰를 전환해 빠르게 살펴볼 수 있습니다.
        </p>
        <div class="meta-info" id="routeInfo">/gallery</div>
      </div>
    </section>

    <div class="toolbar">
      <div class="count" id="countText">Loading...</div>
      <div class="view-switch">
        <button type="button" class="view-btn active" data-view="grid">Grid</button>
        <button type="button" class="view-btn" data-view="list">List</button>
      </div>
    </div>

    <section class="gallery grid-view" id="gallery"></section>
    <div class="loading" id="loadingBox">이미지를 불러오는 중입니다.</div>
  </div>

  <div id="modal">
    <div class="modal-inner">
      <span class="close-btn">&times;</span>
      <img id="modal-img" src="" alt="확대 이미지" />
    </div>
  </div>

  <script>
    const API_BASE = 'https://localflow.ddns.net/images';
    const DEFAULT_FOLDER = 'object';
    const PAGE_SIZE = 24;

    const gallery = document.getElementById('gallery');
    const loadingBox = document.getElementById('loadingBox');
    const countText = document.getElementById('countText');
    const folderTitle = document.getElementById('folderTitle');
    const routeInfo = document.getElementById('routeInfo');
    const modal = document.getElementById('modal');
    const modalImg = document.getElementById('modal-img');
    const closeBtn = document.querySelector('.close-btn');
    const viewButtons = document.querySelectorAll('.view-btn');

    let currentPage = 1;
    let hasNext = true;
    let isLoading = false;
    let currentFolder = DEFAULT_FOLDER;

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function getFolderFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get('folder') || DEFAULT_FOLDER;
    }

    function setPageHeader(folder) {
      folderTitle.textContent = String(folder).toUpperCase();
      routeInfo.textContent = `/gallery?folder=${folder}`;
      document.title = `STANCE GALLERY - ${String(folder).toUpperCase()}`;
    }

    function renderItems(items) {
          const html = items.map((item) => `
            <article class="item" data-src="${escapeHtml(item.url)}" data-file="${escapeHtml(item.filename || item.title || '')}">
              <img src="${escapeHtml(item.url)}" alt="${escapeHtml(item.title || item.filename || 'image')}" loading="lazy" />
              <div class="overlay">
                <div class="overlay-title">${escapeHtml(item.filename || item.title || 'Untitled')}</div>
                <div class="overlay-tag">${escapeHtml(item.category || currentFolder)}</div>
              </div>
              <div class="list-meta">
                <div>
                  <div class="list-folder">${escapeHtml(item.category || currentFolder)}</div>
                  <div class="list-title">${escapeHtml(item.filename || item.title || 'Untitled')}</div>
                </div>
                <div class="list-desc">
                  공개 갤러리 이미지입니다. API에서 전달받은 메타데이터를 기준으로 렌더링합니다.
                </div>
              </div>
            </article>
          `).join('');
    
          gallery.insertAdjacentHTML('beforeend', html);
        }

    function renderEmpty() {
      gallery.innerHTML = '<div class="empty">표시할 이미지가 없습니다.</div>';
      loadingBox.style.display = 'none';
      countText.textContent = 'Total 0 images';
    }

    function renderError(message) {
      gallery.innerHTML = `<div class="error-box">${escapeHtml(message)}</div>`;
      loadingBox.style.display = 'none';
      countText.textContent = 'Load failed';
    }

    async function loadImages(page = 1) {
      if (isLoading || (!hasNext && page !== 1)) {
        return;
      }

      isLoading = true;
      loadingBox.style.display = 'block';
      loadingBox.textContent = '이미지를 불러오는 중입니다.';

      try {
        const response = await fetch(
          `${API_BASE}/api/gallery/${encodeURIComponent(currentFolder)}?page=${page}&page_size=${PAGE_SIZE}`,
          {
            method: 'GET',
            headers: {
              Accept: 'application/json'
            }
          }
        );

        if (!response.ok) {
          throw new Error(`API request failed: ${response.status}`);
        }

        const data = await response.json();

        currentPage = data.page || page;
        hasNext = Boolean(data.has_next);

        if (page === 1) {
          gallery.innerHTML = '';
        }

        if (!data.items || data.items.length === 0) {
          if (page === 1) {
            renderEmpty();
          } else {
            loadingBox.textContent = '마지막 이미지까지 표시했습니다.';
          }
          return;
        }

        renderItems(data.items);
        countText.innerHTML = `Total <strong>${data.total || 0}</strong> images`;

        if (!hasNext) {
          loadingBox.textContent = '마지막 이미지까지 표시했습니다.';
        } else {
          loadingBox.style.display = 'none';
        }
      } catch (error) {
        console.error(error);
        renderError('이미지를 불러오지 못했습니다. API 주소와 CORS 설정을 확인하세요.');
      } finally {
        isLoading = false;
      }
    }

    function closeModal() {
      modal.style.display = 'none';
      modalImg.src = '';
      document.body.style.overflow = '';
    }

    gallery.addEventListener('click', (event) => {
      const item = event.target.closest('.item');
      if (!item) return;

      modalImg.src = item.dataset.src;
      modal.style.display = 'flex';
      document.body.style.overflow = 'hidden';
    });

    closeBtn.addEventListener('click', closeModal);

    modal.addEventListener('click', (event) => {
      if (event.target === modal) {
        closeModal();
      }
    });

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') {
        closeModal();
      }
    });

    viewButtons.forEach((button) => {
      button.addEventListener('click', () => {
        viewButtons.forEach((btn) => btn.classList.remove('active'));
        button.classList.add('active');

        const mode = button.dataset.view;
        gallery.classList.toggle('grid-view', mode === 'grid');
        gallery.classList.toggle('list-view', mode === 'list');
      });
    });

    window.addEventListener('scroll', async () => {
      if (isLoading || !hasNext) return;

      const threshold = 300;
      const reachedBottom =
        window.innerHeight + window.scrollY >= document.body.offsetHeight - threshold;

      if (reachedBottom) {
        await loadImages(currentPage + 1);
      }
    });

    function init() {
      currentFolder = getFolderFromUrl();
      setPageHeader(currentFolder);
      loadImages(1);
    }

    init();
  </script>
</body>
</html>
