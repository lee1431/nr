<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STANCE GALLERY</title>
  <style>
    :root {
      --bg: #f4f4f1;
      --line: rgba(0, 0, 0, 0.08);
      --text: #111;
      --muted: #666;
      --point: #1d3b34;
      --white: #fff;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
      --radius: 16px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Pretendard, "Apple SD Gothic Neo", sans-serif;
      color: var(--text);
      background:
        linear-gradient(rgba(0, 0, 0, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 0, 0, 0.025) 1px, transparent 1px),
        radial-gradient(circle at top left, rgba(29, 59, 52, 0.07), transparent 26%),
        var(--bg);
      background-size: 30px 30px, 30px 30px, auto, auto;
    }

    .wrap { max-width: 1320px; margin: 0 auto; padding: 32px 20px 56px; }

    .hero {
      margin-bottom: 28px; padding: 24px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid var(--line);
      border-radius: 24px;
      backdrop-filter: blur(8px);
      box-shadow: var(--shadow);
    }

    .eyebrow {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 12px; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--point); margin-bottom: 12px;
    }
    .eyebrow::before { content: ""; width: 26px; height: 1px; background: var(--point); display: block; }

    h1 { font-size: clamp(34px, 6vw, 72px); line-height: 0.95; letter-spacing: -0.05em; font-weight: 500; margin-bottom: 12px; }

    .hero-bottom { display: flex; justify-content: space-between; gap: 20px; align-items: end; flex-wrap: wrap; }
    .hero p { color: var(--muted); font-size: 14px; line-height: 1.7; max-width: 720px; }
    .meta-info { font-size: 12px; color: var(--muted); white-space: nowrap; }

    /* 폴더 네비게이션 스타일 */
    .folder-nav {
      display: flex; gap: 8px; margin-bottom: 24px; overflow-x: auto;
      padding-bottom: 8px; -ms-overflow-style: none; scrollbar-width: none;
    }
    .folder-nav::-webkit-scrollbar { display: none; }
    
    .folder-btn {
      padding: 10px 20px; border-radius: 999px; border: 1px solid var(--line);
      background: var(--white); cursor: pointer; font-size: 13px;
      transition: all 0.2s ease; white-space: nowrap;
    }
    .folder-btn.active { background: var(--point); color: var(--white); border-color: var(--point); }

    .toolbar {
      display: flex; justify-content: space-between; align-items: center;
      gap: 14px; margin-bottom: 18px; flex-wrap: wrap;
    }

    .view-btn {
      border: 1px solid var(--line); background: rgba(255, 255, 255, 0.85);
      color: var(--text); padding: 9px 14px; border-radius: 999px;
      font-size: 12px; cursor: pointer; transition: 0.2s ease;
    }
    .view-btn.active { background: var(--point); color: var(--white); border-color: var(--point); }

    /* 갤러리 레이아웃 */
    .gallery.grid-view { column-count: 3; column-gap: 16px; }
    .gallery.list-view { display: grid; grid-template-columns: 1fr; gap: 14px; }

    .item {
      position: relative; overflow: hidden; border-radius: var(--radius);
      border: 1px solid var(--line); background: #ddd;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04);
      cursor: pointer; break-inside: avoid; margin-bottom: 16px;
      transition: transform 0.35s ease, box-shadow 0.35s ease;
    }
    .item:hover { transform: translateY(-4px); box-shadow: 0 18px 38px rgba(0, 0, 0, 0.08); }
    .item img { width: 100%; display: block; object-fit: cover; background: #e9e9e9; }

    .overlay {
      position: absolute; inset: 0; padding: 14px;
      background: linear-gradient(to top, rgba(0,0,0,0.6), transparent 50%);
      color: white; display: flex; flex-direction: column; justify-content: flex-end;
      opacity: 0; transition: 0.3s ease;
    }
    .item:hover .overlay { opacity: 1; }

    /* 모달 스타일 */
    #modal {
      display: none; position: fixed; inset: 0;
      background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(10px);
      justify-content: center; align-items: center; z-index: 1000; padding: 20px;
    }
    #modal-img { max-width: 100%; max-height: 90vh; border-radius: 8px; }
    .close-btn { position: absolute; top: 20px; right: 20px; color: #fff; font-size: 40px; cursor: pointer; }

    /* 로딩/에러 */
    .loading { padding: 40px; text-align: center; color: var(--muted); }

    @media (max-width: 1024px) { .gallery.grid-view { column-count: 2; } }
    @media (max-width: 600px) { .gallery.grid-view { column-count: 1; } }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="eyebrow">Visual Archive</div>
      <h1><span id="folderTitle">GALLERY</span><br />ARCHIVE</h1>
      <div class="hero-bottom">
        <p>STANCE 파트너 갤러리 아카이브. 원하는 카테고리를 선택하여 프로젝트와 객체 이미지를 탐색하세요.</p>
        <div class="meta-info" id="routeInfo">/gallery</div>
      </div>
    </section>

    <nav class="folder-nav" id="folderNav"></nav>

    <div class="toolbar">
      <div class="count" id="countText">Loading...</div>
      <div class="view-switch">
        <button type="button" class="view-btn active" data-view="grid">Grid</button>
        <button type="button" class="view-btn" data-view="list">List</button>
      </div>
    </div>

    <section class="gallery grid-view" id="gallery"></section>
    <div class="loading" id="loadingBox">이미지를 불러오는 중입니다.</div>
  </div>

  <div id="modal">
    <span class="close-btn">&times;</span>
    <img id="modal-img" src="" alt="확대 이미지" />
  </div>

  <script>
    const API_BASE = 'https://localflow.ddns.net/images';
    const PAGE_SIZE = 24;
    
    // 사용할 폴더 목록 정의 (여기에 폴더 이름을 추가하세요)
    const FOLDER_LIST = ['object', 'nature', 'fishing', 'main', 'coupon', 'space', 'project', 'etc', 'me',];

    const gallery = document.getElementById('gallery');
    const loadingBox = document.getElementById('loadingBox');
    const countText = document.getElementById('countText');
    const folderTitle = document.getElementById('folderTitle');
    const folderNav = document.getElementById('folderNav');
    const routeInfo = document.getElementById('routeInfo');
    const modal = document.getElementById('modal');
    const modalImg = document.getElementById('modal-img');

    let currentPage = 1;
    let hasNext = true;
    let isLoading = false;
    let currentFolder = '';

    // 1. 폴더 네비게이션 생성
    function createFolderNav() {
      folderNav.innerHTML = FOLDER_LIST.map(folder => `
        <button class="folder-btn ${folder === currentFolder ? 'active' : ''}" 
                onclick="switchFolder('${folder}')">
          ${folder.toUpperCase()}
        </button>
      `).join('');
    }

    // 2. 폴더 전환 로직
    function switchFolder(folder) {
      if (currentFolder === folder || isLoading) return;
      
      currentFolder = folder;
      currentPage = 1;
      hasNext = true;
      gallery.innerHTML = '';
      
      // UI 업데이트
      setPageHeader(folder);
      createFolderNav();
      
      // URL 파라미터 업데이트 (새로고침 없이)
      const newUrl = `${window.location.pathname}?folder=${folder}`;
      window.history.pushState({ path: newUrl }, '', newUrl);
      
      loadImages(1);
    }

    function setPageHeader(folder) {
      folderTitle.textContent = String(folder).toUpperCase();
      routeInfo.textContent = `/gallery?folder=${folder}`;
      document.title = `STANCE GALLERY - ${String(folder).toUpperCase()}`;
    }

    async function loadImages(page = 1) {
      if (isLoading || (!hasNext && page !== 1)) return;

      isLoading = true;
      loadingBox.style.display = 'block';

      try {
        const response = await fetch(
          `${API_BASE}/api/gallery/${encodeURIComponent(currentFolder)}?page=${page}&page_size=${PAGE_SIZE}`
        );
        if (!response.ok) throw new Error('API Error');
        
        const data = await response.json();
        currentPage = data.page || page;
        hasNext = Boolean(data.has_next);

        if (data.items && data.items.length > 0) {
          renderItems(data.items);
          countText.innerHTML = `Total <strong>${data.total || 0}</strong> images`;
        } else if (page === 1) {
          gallery.innerHTML = '<div class="empty">표시할 이미지가 없습니다.</div>';
        }

        loadingBox.style.display = hasNext ? 'none' : 'block';
        if(!hasNext) loadingBox.textContent = '모든 이미지를 로드했습니다.';
      } catch (error) {
        console.error(error);
      } finally {
        isLoading = false;
      }
    }

    function renderItems(items) {
      const html = items.map(item => `
        <article class="item" onclick="openModal('${item.url}')">
          <img src="${item.url}" loading="lazy" />
          <div class="overlay">
            <div class="overlay-tag">${currentFolder}</div>
            <div class="overlay-title">${item.filename || 'Untitled'}</div>
          </div>
        </article>
      `).join('');
      gallery.insertAdjacentHTML('beforeend', html);
    }

    // 모달 제어
    window.openModal = (src) => {
      modalImg.src = src;
      modal.style.display = 'flex';
      document.body.style.overflow = 'hidden';
    };

    document.querySelector('.close-btn').onclick = () => {
      modal.style.display = 'none';
      document.body.style.overflow = '';
    };

    // 뷰 전환 버튼
    document.querySelectorAll('.view-btn').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const view = btn.dataset.view;
        gallery.className = `gallery ${view}-view`;
      };
    });

    // 무한 스크롤
    window.onscroll = () => {
      if (isLoading || !hasNext) return;
      if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 500) {
        loadImages(currentPage + 1);
      }
    };

    function init() {
      const params = new URLSearchParams(window.location.search);
      currentFolder = params.get('folder') || FOLDER_LIST[0];
      setPageHeader(currentFolder);
      createFolderNav();
      loadImages(1);
    }

    init();
  </script>
</body>
</html>
