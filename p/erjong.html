<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>월별 제철 어종</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --hot: #ef4444;
      --hot-bg: #fff1f2;
      --strong: #f97316;
      --strong-bg: #fff7ed;
      --medium: #eab308;
      --medium-bg: #fefce8;
      --light: #22c55e;
      --light-bg: #f0fdf4;
      --inactive-bg: #f9fafb;
      --shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .app {
      width: min(960px, 100%);
      margin: 0 auto;
      padding: 20px;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .month-nav {
      position: sticky;
      top: 0;
      z-index: 10;
      display: grid;
      grid-template-columns: 56px 1fr 56px;
      align-items: center;
      gap: 12px;
      padding: 18px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--line);
    }

    .nav-btn {
      width: 48px;
      height: 48px;
      border: 0;
      border-radius: 16px;
      background: #111827;
      color: #fff;
      font-size: 24px;
      cursor: pointer;
    }

    .month-title {
      text-align: center;
    }

    .month-title strong {
      display: block;
      font-size: clamp(32px, 8vw, 52px);
      line-height: 1;
      letter-spacing: -0.06em;
    }

    .month-title span {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 14px;
    }

    .content {
      padding: 20px;
    }

    .summary {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 18px;
    }

    .summary h1 {
      margin: 0;
      font-size: 22px;
      letter-spacing: -0.03em;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }

    .dot.hot { background: var(--hot); }
    .dot.strong { background: var(--strong); }
    .dot.medium { background: var(--medium); }
    .dot.light { background: var(--light); }

    .fish-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
    }

    .fish-card {
      position: relative;
      min-height: 118px;
      padding: 16px;
      border: 2px solid var(--line);
      border-radius: 20px;
      background: var(--inactive-bg);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .fish-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 22px rgba(15, 23, 42, 0.08);
    }

    .fish-card.hot {
      border-color: var(--hot);
      background: var(--hot-bg);
    }

    .fish-card.strong {
      border-color: var(--strong);
      background: var(--strong-bg);
    }

    .fish-card.medium {
      border-color: var(--medium);
      background: var(--medium-bg);
    }

    .fish-card.light {
      border-color: var(--light);
      background: var(--light-bg);
    }

    .fish-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }

    .fish-name {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.04em;
    }

    .badge {
      flex: 0 0 auto;
      padding: 5px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      background: #fff;
      border: 1px solid currentColor;
    }

    .hot .badge { color: var(--hot); }
    .strong .badge { color: var(--strong); }
    .medium .badge { color: #a16207; }
    .light .badge { color: #15803d; }

    .season-text {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 14px;
    }

    .month-dots {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 3px;
    }

    .month-dot {
      height: 8px;
      border-radius: 999px;
      background: #e5e7eb;
    }

    .month-dot.on.hot { background: var(--hot); }
    .month-dot.on.strong { background: var(--strong); }
    .month-dot.on.medium { background: var(--medium); }
    .month-dot.on.light { background: var(--light); }

    .empty {
      padding: 40px 16px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: 20px;
      background: #fff;
    }

    @media (max-width: 560px) {
      .app { padding: 0; }
      .panel { min-height: 100vh; border-radius: 0; border: 0; }
      .month-nav { grid-template-columns: 48px 1fr 48px; padding: 14px; }
      .nav-btn { width: 44px; height: 44px; border-radius: 14px; }
      .content { padding: 16px; }
      .summary { align-items: flex-start; }
      .fish-grid { grid-template-columns: 1fr; }
      .fish-card { min-height: 110px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="panel">
      <nav class="month-nav" aria-label="월 이동">
        <button class="nav-btn" id="prevBtn" type="button" aria-label="이전 달">‹</button>
        <div class="month-title">
          <strong id="monthNumber">6월</strong>
          <span id="monthLabel">이번 달 제철 어종</span>
        </div>
        <button class="nav-btn" id="nextBtn" type="button" aria-label="다음 달">›</button>
      </nav>

      <div class="content">
        <div class="summary">
          <h1 id="sectionTitle">6월에 잘 잡히는 어종</h1>
          <div class="legend" aria-label="잡히는 정도">
            <span class="legend-item"><i class="dot hot"></i>핫</span>
            <span class="legend-item"><i class="dot strong"></i>좋음</span>
            <span class="legend-item"><i class="dot medium"></i>보통</span>
            <span class="legend-item"><i class="dot light"></i>초입/끝물</span>
          </div>
        </div>
        <div id="fishGrid" class="fish-grid"></div>
      </div>
    </section>
  </main>

  <script>
    const fishData = [
      { name: "고등어", months: { 3: 2, 4: 3, 5: 4, 6: 4, 7: 3, 8: 2 } },
      { name: "갈치", months: { 6: 2, 7: 3, 8: 4, 9: 4, 10: 3, 11: 2 } },
      { name: "전어", months: { 8: 2, 9: 4, 10: 4, 11: 2 } },
      { name: "방어", months: { 1: 4, 2: 3, 11: 3, 12: 4 } },
      { name: "도다리", months: { 3: 4, 4: 4, 5: 2 } },
      { name: "주꾸미", months: { 3: 3, 4: 4, 5: 3 } },
      { name: "민어", months: { 6: 2, 7: 4, 8: 4, 9: 3 } },
      { name: "농어", months: { 5: 2, 6: 3, 7: 4, 8: 4, 9: 3 } },
      { name: "대구", months: { 1: 4, 2: 3, 12: 4 } },
      { name: "참돔", months: { 4: 3, 5: 4, 6: 3, 10: 2, 11: 2 } },
      { name: "오징어", months: { 6: 2, 7: 3, 8: 4, 9: 4, 10: 3 } },
      { name: "삼치", months: { 1: 2, 10: 3, 11: 4, 12: 4 } }
    ];

    const gradeMap = {
      4: { className: "hot", label: "핫" },
      3: { className: "strong", label: "좋음" },
      2: { className: "medium", label: "보통" },
      1: { className: "light", label: "초입" }
    };

    const today = new Date();
    let currentMonth = today.getMonth() + 1;

    const monthNumber = document.getElementById("monthNumber");
    const monthLabel = document.getElementById("monthLabel");
    const sectionTitle = document.getElementById("sectionTitle");
    const fishGrid = document.getElementById("fishGrid");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");

    function getMonthRangeText(months) {
      const list = Object.keys(months).map(Number).sort((a, b) => a - b);
      return list.map(month => `${month}월`).join(", ");
    }

    function render() {
      const isThisMonth = currentMonth === today.getMonth() + 1;
      monthNumber.textContent = `${currentMonth}월`;
      monthLabel.textContent = isThisMonth ? "이번 달 제철 어종" : `${currentMonth}월 제철 어종`;
      sectionTitle.textContent = `${currentMonth}월에 잘 잡히는 어종`;

      const items = fishData
        .map(fish => ({ ...fish, grade: fish.months[currentMonth] || 0 }))
        .filter(fish => fish.grade > 0)
        .sort((a, b) => b.grade - a.grade || a.name.localeCompare(b.name, "ko"));

      if (!items.length) {
        fishGrid.innerHTML = `<div class="empty">${currentMonth}월에 등록된 어종이 없습니다.</div>`;
        return;
      }

      fishGrid.innerHTML = items.map(fish => {
        const grade = gradeMap[fish.grade];
        const dots = Array.from({ length: 12 }, (_, index) => {
          const month = index + 1;
          const dotGrade = fish.months[month];
          const dotClass = dotGrade ? `on ${gradeMap[dotGrade].className}` : "";
          return `<span class="month-dot ${dotClass}" title="${month}월"></span>`;
        }).join("");

        return `
          <article class="fish-card ${grade.className}">
            <div class="fish-head">
              <div class="fish-name">${fish.name}</div>
              <span class="badge">${grade.label}</span>
            </div>
            <p class="season-text">시즌: ${getMonthRangeText(fish.months)}</p>
            <div class="month-dots" aria-label="${fish.name} 월별 시즌 강도">
              ${dots}
            </div>
          </article>
        `;
      }).join("");
    }

    prevBtn.addEventListener("click", () => {
      currentMonth = currentMonth === 1 ? 12 : currentMonth - 1;
      render();
    });

    nextBtn.addEventListener("click", () => {
      currentMonth = currentMonth === 12 ? 1 : currentMonth + 1;
      render();
    });

    render();
  </script>
</body>
</html>
