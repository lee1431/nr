<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>사자성어 가로세로 퀴즈</title>
    <style>
        body { font-family: 'Arial', sans-serif; display: flex; flex-direction: column; align-items: center; background-color: #f0f2f5; }
        h1 { color: #333; }
        
        /* 격자 스타일 */
        .grid { display: grid; grid-template-columns: repeat(5, 50px); grid-template-rows: repeat(5, 50px); gap: 2px; background-color: #ccc; padding: 5px; border-radius: 8px; }
        .cell { width: 50px; height: 50px; background-color: #fff; display: flex; justify-content: center; align-items: center; position: relative; }
        .cell.empty { background-color: #eee; }
        .cell input { width: 100%; height: 100%; border: none; text-align: center; font-size: 20px; text-transform: uppercase; outline: none; }
        
        /* 힌트 번호 표시 */
        .cell::after { content: attr(data-num); position: absolute; top: 2px; left: 2px; font-size: 10px; color: #888; }

        /* 버튼 및 힌트 */
        .controls { margin-top: 20px; text-align: center; }
        .clues { margin-top: 20px; display: flex; gap: 40px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background-color: #4CAF50; color: white; border: none; border-radius: 5px; }
        button:hover { background-color: #45a049; }
    </style>
</head>
<body>

    <h1>🧩 사자성어 가로세로</h1>

    <div class="grid" id="grid">
        <div class="cell" data-num="1"><input type="text" maxlength="1" id="cell-0-0"></div>
        <div class="cell"><input type="text" maxlength="1" id="cell-0-1"></div>
        <div class="cell" data-num="2"><input type="text" maxlength="1" id="cell-0-2"></div>
        <div class="cell"><input type="text" maxlength="1" id="cell-0-3"></div>
        <div class="cell empty"></div>

        <div class="cell empty"></div>
        <div class="cell empty"></div>
        <div class="cell"><input type="text" maxlength="1" id="cell-1-2"></div>
        <div class="cell empty"></div>
        <div class="cell empty"></div>

        <div class="cell empty"></div>
        <div class="cell empty"></div>
        <div class="cell"><input type="text" maxlength="1" id="cell-2-2"></div>
        <div class="cell empty"></div>
        <div class="cell empty"></div>

        <div class="cell empty"></div>
        <div class="cell empty"></div>
        <div class="cell"><input type="text" maxlength="1" id="cell-3-2"></div>
        <div class="cell empty"></div>
        <div class="cell empty"></div>

        <div class="cell empty"></div><div class="cell empty"></div><div class="cell empty"></div><div class="cell empty"></div><div class="cell empty"></div>
    </div>

    <div class="clues">
        <div>
            <h3>가로 힌트</h3>
            <p><strong>1.</strong> 쓴 것이 다하면 단 것이 온다는 뜻.</p>
        </div>
        <div>
            <h3>세로 힌트</h3>
            <p><strong>2.</strong> 달콤한 말과 이로운 조건으로 남을 꾐.</p>
        </div>
    </div>

    <div class="controls">
        <button onclick="checkAnswer()">정답 확인</button>
        <p id="result"></p>
    </div>

    <script>
        // 정답 데이터
        const answers = {
            'cell-0-0': '고', 'cell-0-1': '진', 'cell-0-2': '감', 'cell-0-3': '래',
            'cell-1-2': '언', 'cell-2-2': '이', 'cell-3-2': '설'
        };

        function checkAnswer() {
            let isCorrect = true;
            for (let id in answers) {
                const input = document.getElementById(id).value;
                if (input !== answers[id]) {
                    isCorrect = false;
                    document.getElementById(id).style.color = 'red';
                } else {
                    document.getElementById(id).style.color = 'blue';
                }
            }

            const resultMsg = document.getElementById('result');
            if (isCorrect) {
                resultMsg.innerText = "🎉 축하합니다! 모든 정답을 맞혔습니다.";
                resultMsg.style.color = "green";
            } else {
                resultMsg.innerText = "❌ 틀린 부분이 있네요. 다시 생각해보세요!";
                resultMsg.style.color = "red";
            }
        }
    </script>
</body>
</html>
