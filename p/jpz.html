<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Planet Chungju - Jigsaw Gallery</title>
  <style>
    :root { --bg: #121416; --accent: #00d2ff; --panel: rgba(0, 0, 0, 0.8); }
    * { box-sizing: border-box; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
    body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; }
    header { position: fixed; top: 0; left: 0; width: 100%; padding: 15px; display: flex; justify-content: space-between; align-items: center; z-index: 100; background: linear-gradient(to bottom, var(--panel), transparent); pointer-events: none; }
    header > * { pointer-events: auto; }
    .btns { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    button { padding: 10px 16px; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; background: var(--panel); color: white; font-weight: bold; cursor: pointer; backdrop-filter: blur(10px); transition: 0.2s; font-size: 13px; }
    button.active { background: var(--accent); color: #000; border-color: var(--accent); }
    #main-container { height: 100vh; overflow-y: auto; padding: 85px 16px 30px; }
    #gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 14px; }
    .item { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; overflow: hidden; cursor: pointer; }
    .item img { width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block; }
    .list-meta { padding: 9px; font-size: 12px; color: #ccc; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #game-container { display: none; position: fixed; inset: 0; background: var(--bg); overflow: hidden; touch-action: none; z-index: 50; }
    #msg-box { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); padding: 12px 25px; background: var(--panel); border-radius: 30px; font-size: 14px; pointer-events: none; z-index: 100; }
    canvas { display: block; width: 100%; height: 100%; touch-action: none; }
    .game-only { display: none; }
    body.playing .game-only { display: inline-block; }
    body.playing #main-container { display: none; }
    @media (max-width: 640px) { #gallery { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; } }
  </style>
</head>
<body>

<header>
  <div style="font-weight:800; font-size:1.1rem;">PLANET <span style="color:var(--accent)">CHUNGJU</span></div>
  <div class="btns">
    <button class="game-only" onclick="backToGallery()">목록</button>
    <button class="game-only active level-btn" onclick="changeLevel(10, this)">100P</button>
    <button class="game-only level-btn" onclick="changeLevel(15, this)">225P</button>
    <button class="game-only" onclick="resetGame()" style="background:#e74c3c;">다시</button>
  </div>
</header>

<main id="main-container">
  <div id="countText" style="margin-bottom:10px; color:#aaa;">이미지 불러오는 중...</div>
  <section id="gallery"></section>
</main>

<section id="game-container">
  <div id="msg-box">조각을 맞춰보셔유!</div>
  <canvas id="mainCanvas"></canvas>
</section>

<script>
  const API_BASE = 'https://localflow.ddns.net/images';
  let currentFolder = new URLSearchParams(window.location.search).get('folder') || 'object';
  const canvas = document.getElementById('mainCanvas');
  const ctx = canvas.getContext('2d');
  const msgBox = document.getElementById('msg-box');

  let img = new Image();
  img.crossOrigin = "Anonymous";
  let pieces = [], selectedPiece = null, gridSize = 10;
  let view = { x: 0, y: 0, scale: 0.7, isPanning: false, startX: 0, startY: 0, lastDist: 0 };
  let dragOffset = { x: 0, y: 0 };

  // --- 이미지 로딩 ---
  async function loadImages() {
    try {
      const res = await fetch(`${API_BASE}/api/gallery/${encodeURIComponent(currentFolder)}?page=1&page_size=40`);
      const data = await res.json();
      document.getElementById('gallery').innerHTML = data.items.map(item => `
        <article class="item" onclick="startGame('${item.url}')">
          <img src="${item.url}" alt="img">
          <div class="list-meta">${item.filename || 'Untitled'}</div>
        </article>
      `).join('');
      document.getElementById('countText').innerHTML = `Total <strong>${data.total}</strong> Images`;
    } catch (e) { console.error(e); }
  }

  function startGame(url) {
    document.body.classList.add('playing');
    document.getElementById('game-container').style.display = 'block';
    img.onload = () => { resize(); resetGame(); };
    img.src = url + "?v=" + Date.now();
  }

  function backToGallery() {
    document.body.classList.remove('playing');
    document.getElementById('game-container').style.display = 'none';
  }

  function resize() {
    canvas.width = window.innerWidth * devicePixelRatio;
    canvas.height = window.innerHeight * devicePixelRatio;
    view.x = window.innerWidth / 2;
    view.y = window.innerHeight / 2;
    draw();
  }

  // --- 퍼즐 엔진 ---
  function getPath(ctx, p, x, y) {
    ctx.beginPath();
    ctx.moveTo(x, y);
    const drawEdge = (x1, y1, x2, y2, type) => {
      if (type === 0) { ctx.lineTo(x2, y2); return; }
      const mx = (x1+x2)/2, my = (y1+y2)/2, nx = -(y2-y1), ny = (x2-x1);
      const n = 0.12, h = 0.22, d = 0.35 * type;
      ctx.bezierCurveTo(x1+(x2-x1)*(0.5-n), y1+(y2-y1)*(0.5-n), mx+nx*d-(x2-x1)*h, my+ny*d-(y2-y1)*h, mx+nx*d, my+ny*d);
      ctx.bezierCurveTo(mx+nx*d+(x2-x1)*h, my+ny*d+(y2-y1)*h, x1+(x2-x1)*(0.5+n), y1+(y2-y1)*(0.5+n), x2, y2);
    };
    drawEdge(x, y, x + p.w, y, p.edges.t);
    drawEdge(x + p.w, y, x + p.w, y + p.h, p.edges.r);
    drawEdge(x + p.w, y + p.h, x, y + p.h, p.edges.b);
    drawEdge(x, y + p.h, x, y, p.edges.l);
    ctx.closePath();
  }

  function resetGame() {
    pieces = [];
    const base = Math.min(window.innerWidth, window.innerHeight) * 0.7;
    const pw = base / gridSize, ph = (pw * img.height) / img.width;
    let map = Array.from({length: gridSize + 1}, () => Array.from({length: gridSize + 1}, () => ({ h:0, v:0 })));
    for(let r=0; r<=gridSize; r++) for(let c=0; c<=gridSize; c++) {
      if(c>0 && c<gridSize) map[r][c].h = Math.random() < 0.5 ? 1 : -1;
      if(r>0 && r<gridSize) map[r][c].v = Math.random() < 0.5 ? 1 : -1;
    }
    for(let r=0; r<gridSize; r++) for(let c=0; c<gridSize; c++) {
      const isLeft = (r * gridSize + c) % 2 === 0;
      pieces.push({
        row: r, col: c, w: pw, h: ph, tab: pw*0.2, isLocked: false,
        edges: { t: map[r][c].v*-1, r: map[r][c+1].h, b: map[r+1][c].v, l: map[r][c].h*-1 },
        x: (isLeft ? -1 : 1) * (base * 0.8 + Math.random()*100),
        y: (Math.random() - 0.5) * window.innerHeight,
        tx: (c - gridSize/2) * pw, ty: (r - gridSize/2) * ph
      });
    }
    draw();
  }

  function draw() {
    const dpr = devicePixelRatio;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
    ctx.translate(view.x, view.y);
    ctx.scale(view.scale, view.scale);

    // 가이드 라인
    pieces.forEach(p => {
      ctx.save(); getPath(ctx, p, p.tx, p.ty);
      ctx.strokeStyle = "rgba(255,255,255,0.1)"; ctx.stroke();
      ctx.fillStyle = "rgba(0,0,0,0.2)"; ctx.fill(); ctx.restore();
    });

    // 조각 (정렬: 잠김 -> 일반 -> 선택됨)
    [...pieces].sort((a,b) => (a===selectedPiece?2:(a.isLocked?-1:0)) - (b===selectedPiece?2:(b.isLocked?-1:0))).forEach(p => {
      ctx.save();
      if(p === selectedPiece) { ctx.shadowColor = "black"; ctx.shadowBlur = 15; }
      getPath(ctx, p, p.x, p.y); ctx.clip();
      const sw = img.width/gridSize, sh = img.height/gridSize, b = p.tab*(img.width/(p.w*gridSize))*2;
      ctx.drawImage(img, (p.col/gridSize)*img.width-b, (p.row/gridSize)*img.height-b, sw+b*2, sh+b*2, p.x-p.tab*2, p.y-p.tab*2, p.w+p.tab*4, p.h+p.tab*4);
      ctx.restore();
      ctx.save(); getPath(ctx, p, p.x, p.y);
      ctx.strokeStyle = p.isLocked ? "rgba(255,255,255,0.1)" : (p===selectedPiece?"#00d2ff":"white");
      ctx.lineWidth = (p===selectedPiece?3:1)/view.scale; ctx.stroke(); ctx.restore();
    });
  }

  // --- 핵심: 터치/마우스 통합 좌표 함수 ---
  function getPoint(e) {
    const rect = canvas.getBoundingClientRect();
    const touch = e.touches ? e.touches[0] : e;
    const rx = touch.clientX - rect.left;
    const ry = touch.clientY - rect.top;
    return {
      rx, ry,
      x: (rx - view.x) / view.scale,
      y: (ry - view.y) / view.scale
    };
  }

  function handleStart(e) {
    if (e.touches && e.touches.length === 2) {
      view.lastDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      return;
    }
    // 터치 시 스크롤 방지 및 즉각 반응
    if(e.cancelable) e.preventDefault();

    const p = getPoint(e);
    selectedPiece = null;
    const dpr = devicePixelRatio;

    // 히트 테스트 (역순 - 가장 위 조각부터)
    for (let i = pieces.length - 1; i >= 0; i--) {
      const pc = pieces[i];
      if (pc.isLocked) continue;
      
      ctx.save();
      ctx.setTransform(view.scale * dpr, 0, 0, view.scale * dpr, view.x * dpr, view.y * dpr);
      getPath(ctx, pc, pc.x, pc.y);
      if (ctx.isPointInPath(p.rx * dpr, p.ry * dpr)) {
        selectedPiece = pc;
        dragOffset.x = p.x - pc.x;
        dragOffset.y = p.y - pc.y;
        pieces.splice(i, 1); pieces.push(pc);
        ctx.restore(); break;
      }
      ctx.restore();
    }

    if (!selectedPiece) {
      view.isPanning = true;
      view.startX = p.rx - view.x;
      view.startY = p.ry - view.y;
    }
    draw();
  }

  function handleMove(e) {
    if(e.cancelable) e.preventDefault();
    if (e.touches && e.touches.length === 2) {
      const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2, midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
      const ns = Math.max(0.1, Math.min(5, view.scale * (dist / view.lastDist)));
      view.x = midX - (midX - view.x) * (ns / view.scale);
      view.y = midY - (midY - view.y) * (ns / view.scale);
      view.scale = ns; view.lastDist = dist;
      draw(); return;
    }
    const p = getPoint(e);
    if (selectedPiece) {
      selectedPiece.x = p.x - dragOffset.x;
      selectedPiece.y = p.y - dragOffset.y;
    } else if (view.isPanning) {
      view.x = p.rx - view.startX;
      view.y = p.ry - view.startY;
    }
    draw();
  }

  function handleEnd() {
    if (selectedPiece) {
      const d = Math.hypot(selectedPiece.x - selectedPiece.tx, selectedPiece.y - selectedPiece.ty);
      if (d < 30 / view.scale) {
        selectedPiece.x = selectedPiece.tx; selectedPiece.y = selectedPiece.ty;
        selectedPiece.isLocked = true;
        const win = pieces.filter(p => p.isLocked).length;
        msgBox.innerText = `맞춘 조각: ${win} / ${pieces.length}`;
      }
    }
    selectedPiece = null; view.isPanning = false;
    draw();
  }

  function changeLevel(n, btn) {
    gridSize = n;
    document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    resetGame();
  }

  canvas.addEventListener('touchstart', handleStart, { passive: false });
  window.addEventListener('touchmove', handleMove, { passive: false });
  window.addEventListener('touchend', handleEnd);
  canvas.addEventListener('mousedown', handleStart);
  window.addEventListener('mousemove', handleMove);
  window.addEventListener('mouseup', handleEnd);
  
  loadImages();
  window.addEventListener('resize', resize);
</script>
</body>
</html>
