<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LocalFlow Dashboard</title>
  <style>
    :root {
      --bg-color: #f6f7fb;
      --bg-gradient: radial-gradient(circle at top left, rgba(59, 130, 246, 0.14), transparent 34%),
                     radial-gradient(circle at top right, rgba(14, 165, 233, 0.10), transparent 28%),
                     #f6f7fb;
      --panel-bg: rgba(255, 255, 255, 0.78);
      --column-bg: rgba(255, 255, 255, 0.72);
      --column-border: rgba(148, 163, 184, 0.28);
      --card-bg: #ffffff;
      --card-border: rgba(226, 232, 240, 0.95);
      --text-main: #111827;
      --text-muted: #6b7280;
      --text-soft: #94a3b8;
      --accent: #2563eb;
      --accent-soft: rgba(37, 99, 235, 0.10);
      --success: #16a34a;
      --warning: #f59e0b;
      --danger: #ef4444;
      --shadow-sm: 0 8px 24px rgba(15, 23, 42, 0.06);
      --shadow-md: 0 18px 48px rgba(15, 23, 42, 0.10);
      --radius-lg: 24px;
      --radius-md: 18px;
      --radius-sm: 14px;
      --completed-op: 0.52;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      height: 100%;
      -webkit-text-size-adjust: 100%;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      font-family: Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg-gradient);
      color: var(--text-main);
      margin: 0;
      padding: 28px;
      overscroll-behavior-x: none;
    }

    button,
    select,
    input {
      font: inherit;
    }

    button,
    select,
    input[type="checkbox"] {
      touch-action: manipulation;
    }

    .app-shell {
      width: min(1280px, 100%);
      margin: 0 auto;
    }

    .header-area {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
      margin-bottom: 22px;
      padding: 22px 24px;
      border: 1px solid rgba(255, 255, 255, 0.82);
      border-radius: var(--radius-lg);
      background: var(--panel-bg);
      box-shadow: var(--shadow-sm);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .title-wrap {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 0;
    }

    .eyebrow {
      display: inline-flex;
      width: fit-content;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.85rem, 4vw, 2.7rem);
      line-height: 1.04;
      letter-spacing: -0.045em;
    }

    .subtitle {
      margin: 0;
      color: var(--text-muted);
      font-size: 0.95rem;
      line-height: 1.55;
    }

    .sync-card {
      min-width: 210px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
      padding-top: 4px;
    }

    .sync-status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 38px;
      padding: 9px 12px;
      border: 1px solid rgba(148, 163, 184, 0.28);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.78);
      color: var(--text-muted);
      font-size: 0.82rem;
      font-weight: 650;
      white-space: nowrap;
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.04);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--warning);
      box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.14);
    }

    .status-dot.is-ok {
      background: var(--success);
      box-shadow: 0 0 0 4px rgba(22, 163, 74, 0.12);
    }

    .status-dot.is-error {
      background: var(--danger);
      box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.12);
    }

    .sync-caption {
      margin: 0;
      color: var(--text-soft);
      font-size: 0.76rem;
    }

    .board-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      margin-bottom: 14px;
      padding: 0 4px;
      color: var(--text-muted);
      font-size: 0.88rem;
      font-weight: 650;
    }

    .board-hint {
      display: inline-flex;
      align-items: center;
      gap: 7px;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, minmax(280px, 1fr));
      gap: 18px;
      align-items: flex-start;
      padding-bottom: 24px;
      width: 100%;
    }

    .column {
      min-width: 0;
      padding: 14px;
      border: 1px solid var(--column-border);
      border-radius: var(--radius-lg);
      background: var(--column-bg);
      box-shadow: var(--shadow-sm);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    }

    .column:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
      border-color: rgba(37, 99, 235, 0.18);
    }

    .column-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 6px 4px 14px;
    }

    .column-title-group {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .column-title {
      font-size: 1.02rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .task-count {
      min-width: 26px;
      height: 26px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 8px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.06);
      color: var(--text-muted);
      font-size: 0.76rem;
      font-weight: 800;
    }

    .sort-select {
      height: 36px;
      min-width: 96px;
      padding: 0 30px 0 11px;
      border: 1px solid rgba(203, 213, 225, 0.9);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.82);
      color: var(--text-muted);
      font-size: 0.78rem;
      font-weight: 700;
      outline: none;
      cursor: pointer;
    }

    .sort-select:focus {
      border-color: rgba(37, 99, 235, 0.65);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.10);
    }

    .task-list {
      min-height: 180px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 4px;
      border-radius: var(--radius-md);
      transition: background 0.18s ease, box-shadow 0.18s ease;
    }

    .task {
      position: relative;
      overflow: hidden;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-md);
      padding: 15px;
      box-shadow: 0 10px 26px rgba(15, 23, 42, 0.06);
      cursor: grab;
      transition: transform 0.16s ease, box-shadow 0.16s ease, border-color 0.16s ease, opacity 0.2s ease;
      user-select: none;
    }

    .task::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 5px;
      background: var(--accent);
      border-radius: var(--radius-md) 0 0 var(--radius-md);
    }

    .task:hover {
      transform: translateY(-2px);
      border-color: rgba(37, 99, 235, 0.26);
      box-shadow: 0 16px 34px rgba(15, 23, 42, 0.10);
    }

    .task:active {
      cursor: grabbing;
      transform: scale(0.99);
    }

    .task.completed {
      opacity: var(--completed-op);
      filter: grayscale(0.45);
    }

    .task.completed::before {
      background: #cbd5e1;
    }

    .task.completed .task-title {
      text-decoration: line-through;
      color: var(--text-muted);
    }

    .task-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 14px;
    }

    .task-title {
      display: block;
      padding-left: 2px;
      font-weight: 750;
      font-size: 0.96rem;
      line-height: 1.42;
      letter-spacing: -0.015em;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }

    .task input[type="checkbox"] {
      appearance: none;
      flex: 0 0 auto;
      width: 22px;
      height: 22px;
      margin: 1px 0 0;
      border: 1.5px solid #cbd5e1;
      border-radius: 7px;
      background: #fff;
      cursor: pointer;
      transition: all 0.14s ease;
    }

    .task input[type="checkbox"]:checked {
      border-color: var(--success);
      background: var(--success);
      box-shadow: inset 0 0 0 4px #fff;
    }

    .task-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    .priority-badge,
    .date-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 28px;
      padding: 5px 9px;
      border-radius: 999px;
      background: #f8fafc;
      border: 1px solid rgba(226, 232, 240, 0.9);
      font-weight: 700;
      white-space: nowrap;
    }

    .priority-high {
      color: #dc2626;
      background: rgba(239, 68, 68, 0.08);
      border-color: rgba(239, 68, 68, 0.16);
    }

    .priority-mid {
      color: #d97706;
      background: rgba(245, 158, 11, 0.10);
      border-color: rgba(245, 158, 11, 0.18);
    }

    .priority-low {
      color: #64748b;
    }

    .add-btn {
      width: 100%;
      min-height: 44px;
      margin-top: 12px;
      padding: 12px 14px;
      border: 1px dashed rgba(100, 116, 139, 0.45);
      border-radius: var(--radius-md);
      background: rgba(255, 255, 255, 0.52);
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 800;
      transition: all 0.16s ease;
    }

    .add-btn:hover {
      border-color: rgba(37, 99, 235, 0.45);
      background: rgba(37, 99, 235, 0.08);
      color: var(--accent);
      transform: translateY(-1px);
    }

    .drag-over {
      background: rgba(37, 99, 235, 0.08);
      box-shadow: inset 0 0 0 1px rgba(37, 99, 235, 0.16);
    }

    .empty-state {
      display: flex;
      min-height: 128px;
      align-items: center;
      justify-content: center;
      padding: 18px;
      border: 1px dashed rgba(148, 163, 184, 0.45);
      border-radius: var(--radius-md);
      color: var(--text-soft);
      text-align: center;
      font-size: 0.86rem;
      font-weight: 650;
      line-height: 1.5;
      background: rgba(255, 255, 255, 0.34);
    }

    @media (max-width: 980px) {
      body {
        padding: 20px;
      }

      .board {
        display: flex;
        overflow-x: auto;
        scroll-snap-type: x mandatory;
        scroll-padding: 20px;
        padding: 2px 2px 18px;
        -webkit-overflow-scrolling: touch;
      }

      .board::-webkit-scrollbar {
        height: 8px;
      }

      .board::-webkit-scrollbar-thumb {
        border-radius: 999px;
        background: rgba(148, 163, 184, 0.45);
      }

      .column {
        flex: 0 0 min(360px, 82vw);
        min-width: min(360px, 82vw);
        scroll-snap-align: start;
      }
    }

    @media (max-width: 640px) {
      body {
        padding: 12px;
      }

      .app-shell {
        width: 100%;
      }

      .header-area {
        position: sticky;
        top: 8px;
        z-index: 10;
        flex-direction: column;
        gap: 14px;
        margin-bottom: 14px;
        padding: 16px;
        border-radius: 22px;
      }

      .eyebrow {
        font-size: 0.72rem;
        padding: 5px 9px;
      }

      h1 {
        font-size: 1.7rem;
      }

      .subtitle {
        font-size: 0.88rem;
        line-height: 1.45;
      }

      .sync-card {
        width: 100%;
        min-width: 0;
        align-items: stretch;
      }

      .sync-status {
        width: 100%;
        justify-content: center;
        min-height: 42px;
        padding: 10px 12px;
        white-space: normal;
        text-align: center;
      }

      .sync-caption {
        text-align: center;
      }

      .board-toolbar {
        position: sticky;
        top: 164px;
        z-index: 9;
        align-items: stretch;
        flex-direction: column;
        gap: 8px;
        margin: 0 0 10px;
        padding: 10px 12px;
        border: 1px solid rgba(255, 255, 255, 0.72);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.72);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.05);
        font-size: 0.8rem;
      }

      .board {
        gap: 12px;
        scroll-padding: 12px;
        padding: 2px 2px calc(22px + var(--safe-bottom));
      }

      .column {
        flex-basis: calc(100vw - 34px);
        min-width: calc(100vw - 34px);
        padding: 12px;
        border-radius: 22px;
      }

      .column:hover,
      .task:hover,
      .add-btn:hover {
        transform: none;
      }

      .column-header {
        gap: 10px;
        padding: 4px 2px 12px;
      }

      .column-title {
        font-size: 0.98rem;
      }

      .sort-select {
        height: 40px;
        min-width: 102px;
        font-size: 0.78rem;
      }

      .task-list {
        min-height: 48vh;
        gap: 10px;
        padding: 2px;
      }

      .task {
        padding: 14px;
        border-radius: 17px;
        box-shadow: 0 8px 22px rgba(15, 23, 42, 0.07);
      }

      .task-header {
        gap: 10px;
        margin-bottom: 12px;
      }

      .task-title {
        font-size: 0.95rem;
      }

      .task input[type="checkbox"] {
        width: 26px;
        height: 26px;
        border-radius: 9px;
      }

      .task-meta {
        align-items: flex-start;
        flex-direction: column;
        gap: 7px;
        font-size: 0.76rem;
      }

      .priority-badge,
      .date-badge {
        min-height: 30px;
        padding: 6px 9px;
      }

      .add-btn {
        position: sticky;
        bottom: calc(10px + var(--safe-bottom));
        z-index: 5;
        min-height: 48px;
        border-style: solid;
        background: rgba(255, 255, 255, 0.88);
        box-shadow: 0 10px 28px rgba(15, 23, 42, 0.10);
      }
    }

    @media (max-width: 390px) {
      .header-area {
        padding: 14px;
      }

      h1 {
        font-size: 1.52rem;
      }

      .subtitle {
        font-size: 0.82rem;
      }

      .board-toolbar {
        top: 154px;
      }

      .column {
        flex-basis: calc(100vw - 28px);
        min-width: calc(100vw - 28px);
      }

      .column-header {
        align-items: flex-start;
        flex-direction: column;
      }

      .sort-select {
        width: 100%;
      }
    }
  </style>
  <script src="https://bernardo-castilho.github.io/DragDropTouch/DragDropTouch.js"></script>
</head>
<body>
  <main class="app-shell">
    <div class="header-area">
      <div class="title-wrap">
        <span class="eyebrow">LocalFlow Workspace</span>
        <h1>🚀 LocalFlow Dash</h1>
        <p class="subtitle">오늘 처리할 업무를 정리하고, 진행 상태를 한눈에 관리하세요.</p>
      </div>
      <div class="sync-card">
        <div id="syncStatus" class="sync-status"><span class="status-dot"></span><span>서버 연결 중...</span></div>
        <p class="sync-caption">변경사항은 자동으로 저장됩니다.</p>
      </div>
    </div>

    <div class="board-toolbar">
      <span class="board-hint">↔ 카드를 드래그해서 상태를 이동하세요</span>
      <span id="taskSummary">총 0개 작업</span>
    </div>

    <div class="board" id="board"></div>
  </main>

  <script>
    const API_URL = "https://mrdindoin.ddns.net/jsonhub/api/json/localflow/dashboard";
    
    let state = {
      columns: [
        { id: "todo", title: "📝 할 일", sort: "date", tasks: [] },
        { id: "doing", title: "⚡ 진행 중", sort: "date", tasks: [] },
        { id: "done", title: "✅ 완료", sort: "date", tasks: [] }
      ]
    };

    let draggedTaskId = null;
    let draggedFromColId = null;

    function setSyncStatus(message, type = "pending") {
      const syncStatus = document.getElementById('syncStatus');
      const className = type === "ok" ? "status-dot is-ok" : type === "error" ? "status-dot is-error" : "status-dot";
      syncStatus.innerHTML = `<span class="${className}"></span><span>${message}</span>`;
    }

    function updateTaskSummary() {
      const total = state.columns.reduce((sum, col) => sum + col.tasks.length, 0);
      const completed = state.columns.reduce((sum, col) => sum + col.tasks.filter(task => task.completed).length, 0);
      document.getElementById('taskSummary').innerText = `총 ${total}개 작업 · 완료 ${completed}개`;
    }

    function getPriority(task) {
      if (task.importance === 3) return { label: "높음", icon: "🔥", className: "priority-high" };
      if (task.importance === 2) return { label: "보통", icon: "🔔", className: "priority-mid" };
      return { label: "낮음", icon: "💤", className: "priority-low" };
    }

    // 1. 서버에서 데이터 로드 (초기화)
    async function loadData() {
      try {
        const res = await fetch(API_URL);
        if (res.ok) {
          const data = await res.json();
          // 백엔드에서 주는 _meta 정보 제외하고 columns 상태만 동기화
          if (data.columns) state.columns = data.columns;
          setSyncStatus(`최근 동기화: ${data._meta?.updated_at || '방금'}`, "ok");
        } else if (res.status === 404) {
          console.log("기존 데이터 없음. 새 대시보드를 시작합니다.");
          setSyncStatus("새 프로젝트 시작", "ok");
        }
      } catch (err) {
        console.error("데이터 로드 실패:", err);
        setSyncStatus("서버 연결 오류", "error");
      }
      render();
    }

    // 2. 서버에 데이터 저장 (POST)
    async function syncToServer() {
      setSyncStatus("저장 중...");
      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(state)
        });
        const result = await res.json();
        if (result.ok) {
          // 서버에서 자동으로 붙여준 updated_at 표시
          const now = new Date().toLocaleTimeString();
          setSyncStatus(`저장 완료 (${now})`, "ok");
        }
      } catch (err) {
        console.error("저장 실패:", err);
        setSyncStatus("저장 실패 (오프라인)", "error");
      }
    }

    // 3. 화면 렌더링
    function render() {
      const board = document.getElementById('board');
      board.innerHTML = '';
      updateTaskSummary();

      state.columns.forEach(col => {
        let sortedTasks = [...col.tasks];
        if (col.sort === 'importance') sortedTasks.sort((a, b) => b.importance - a.importance);
        else if (col.sort === 'date') sortedTasks.sort((a, b) => new Date(a.date) - new Date(b.date));

        const colEl = document.createElement('div');
        colEl.className = 'column';
        colEl.innerHTML = `
          <div class="column-header">
            <div class="column-title-group">
              <span class="column-title">${col.title}</span>
              <span class="task-count">${col.tasks.length}</span>
            </div>
            <select class="sort-select" onchange="changeSort('${col.id}', this.value)" aria-label="${col.title} 정렬 방식">
              <option value="date" ${col.sort === 'date' ? 'selected' : ''}>날짜순</option>
              <option value="importance" ${col.sort === 'importance' ? 'selected' : ''}>중요도순</option>
            </select>
          </div>
          <div class="task-list" data-id="${col.id}"></div>
          <button class="add-btn" onclick="addTask('${col.id}')">＋ 새 작업 추가</button>
        `;

        const taskList = colEl.querySelector('.task-list');
        
        // 드래그 앤 드롭 이벤트
        taskList.ondragover = e => { e.preventDefault(); taskList.classList.add('drag-over'); };
        taskList.ondragleave = () => taskList.classList.remove('drag-over');
        taskList.ondrop = e => handleDrop(e, col.id);

        if (sortedTasks.length === 0) {
          const emptyEl = document.createElement('div');
          emptyEl.className = 'empty-state';
          emptyEl.innerHTML = '아직 작업이 없습니다.<br>아래 버튼으로 새 작업을 추가하세요.';
          taskList.appendChild(emptyEl);
        }

        sortedTasks.forEach(task => {
          const priority = getPriority(task);
          const taskEl = document.createElement('div');
          taskEl.className = `task ${task.completed ? 'completed' : ''}`;
          taskEl.draggable = true;
          taskEl.innerHTML = `
            <div class="task-header">
              <span class="task-title">${task.content}</span>
              <input type="checkbox" ${task.completed ? 'checked' : ''} onchange="toggleComplete('${col.id}', '${task.id}')" aria-label="작업 완료 처리">
            </div>
            <div class="task-meta">
              <span class="priority-badge ${priority.className}">${priority.icon} ${priority.label}</span>
              <span class="date-badge">📅 ${task.date}</span>
            </div>
          `;

          taskEl.ondragstart = () => { draggedTaskId = task.id; draggedFromColId = col.id; };
          taskList.appendChild(taskEl);
        });

        board.appendChild(colEl);
      });
    }

    // 4. 로직 함수들
    function addTask(colId) {
      const content = prompt("할 일을 입력하세요");
      if (!content) return;
      const col = state.columns.find(c => c.id === colId);
      col.tasks.push({
        id: 't-' + Date.now(),
        content,
        importance: 2,
        date: new Date().toISOString().split('T')[0],
        completed: false
      });
      render();
      syncToServer();
    }

    function toggleComplete(colId, taskId) {
      const col = state.columns.find(c => c.id === colId);
      const task = col.tasks.find(t => t.id === taskId);
      task.completed = !task.completed;
      render();
      syncToServer();
    }

    function changeSort(colId, sortVal) {
      const col = state.columns.find(c => c.id === colId);
      col.sort = sortVal;
      render();
      syncToServer();
    }

    function handleDrop(e, targetColId) {
      e.preventDefault();
      if (draggedFromColId === targetColId) return;

      const sourceCol = state.columns.find(c => c.id === draggedFromColId);
      const targetCol = state.columns.find(c => c.id === targetColId);
      const taskIdx = sourceCol.tasks.findIndex(t => t.id === draggedTaskId);
      const [task] = sourceCol.tasks.splice(taskIdx, 1);
      
      targetCol.tasks.push(task);
      render();
      syncToServer();
    }

    // 초기 실행
    loadData();
  </script>
</body>
</html>
