<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STANCE | Project Library</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --primary-color: #333;
            --accent-color: #007bff;
            --border-color: #eee;
        }

        body { font-family: 'Pretendard', sans-serif; background: var(--bg-color); color: var(--primary-color); margin: 0; padding: 40px 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        header { margin-bottom: 40px; text-align: center; }
        
        .filter-nav { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; }
        .filter-btn { padding: 8px 16px; border: 1px solid var(--border-color); background: var(--card-bg); cursor: pointer; border-radius: 20px; transition: 0.2s; }
        .filter-btn.active { background: var(--primary-color); color: #white; border-color: var(--primary-color); color: white; }

        .library-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { background: var(--card-bg); border-radius: 12px; padding: 20px; border: 1px solid var(--border-color); box-shadow: 0 4px 6px rgba(0,0,0,0.05); display: flex; flex-direction: column; }
        .card-tag { font-size: 12px; font-weight: bold; text-transform: uppercase; color: var(--accent-color); margin-bottom: 8px; }
        .card-title { font-size: 1.2rem; margin: 0 0 10px 0; }
        .card-desc { font-size: 0.9rem; color: #666; flex-grow: 1; margin-bottom: 20px; line-height: 1.5; }
        
        .card-actions { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 10px; text-align: center; border: none; border-radius: 6px; cursor: pointer; font-size: 0.85rem; text-decoration: none; font-weight: 500; }
        .btn-view { background: #eee; color: #333; }
        .btn-action { background: var(--accent-color); color: white; }

        #modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; width: 90%; max-width: 800px; max-height: 80vh; border-radius: 12px; padding: 30px; overflow-y: auto; position: relative; }
        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 24px; cursor: pointer; }
        pre { background: #2d2d2d; color: #ccc; padding: 15px; border-radius: 8px; overflow-x: auto; white-space: pre-wrap; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Stance Library</h1>
        <p>프로젝트에 바로 활용 가능한 컴포넌트 및 에셋 저장소</p>
    </header>

    <nav class="filter-nav">
        <button class="filter-btn active" onclick="filterItems('all')">전체</button>
        <button class="filter-btn" onclick="filterItems('component')">컴포넌트</button>
        <button class="filter-btn" onclick="filterItems('image')">이미지</button>
        <button class="filter-btn" onclick="filterItems('file')">파일</button>
    </nav>

    <div id="library-grid" class="library-grid">
        <p>Loading library items...</p>
    </div>
</div>

<div id="modal" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <div id="modal-body"></div>
    </div>
</div>

<script>
    let libraryData = [];

    async function loadLibrary() {
        try {
            const response = await fetch('https://mrdindoin.ddns.net/jsonhub/api/json/localflow/data');
            libraryData = await response.json();
            renderItems(libraryData);
        } catch (error) {
            console.error("데이터를 불러오는데 실패했습니다.", error);
            document.getElementById('library-grid').innerHTML = "<p>데이터를 불러올 수 없습니다. JSON 파일을 확인해주세요.</p>";
        }
    }

    function renderItems(items) {
        const grid = document.getElementById('library-grid');
        grid.innerHTML = items.map(item => `
            <div class="card" data-category="${item.category}">
                <div class="card-tag">${item.category}</div>
                <h3 class="card-title">${item.title}</h3>
                <p class="card-desc">${item.description}</p>
                <div class="card-actions">
                    ${renderButtons(item)}
                </div>
            </div>
        `).join('');
    }

    function renderButtons(item) {
        if (item.category === 'component') {
            return `<button class="btn btn-action" onclick="showCode(${item.id})">코드 복사</button>`;
        } else if (item.category === 'image') {
            return `
                <button class="btn btn-view" onclick="viewImage('${item.url}')">크게 보기</button>
                <a href="${item.url}" download class="btn btn-action">다운로드</a>
            `;
        } else {
            return `<a href="${item.url}" download class="btn btn-action">파일 다운로드</a>`;
        }
    }

    function filterItems(category) {
        const btns = document.querySelectorAll('.filter-btn');
        btns.forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');

        const filtered = category === 'all' ? libraryData : libraryData.filter(i => i.category === category);
        renderItems(filtered);
    }

    function showCode(id) {
        const item = libraryData.find(i => i.id === id);
        const modal = document.getElementById('modal');
        const body = document.getElementById('modal-body');
        
        const fullCode = `<!-- HTML -->\n${item.code.html}\n\n/* CSS */\n${item.code.css}\n\n// JS\n${item.code.js}`;
        
        body.innerHTML = `
            <h2>${item.title}</h2>
            <p>아래 코드를 복사해서 사용하세요.</p>
            <pre id="code-block">${escapeHtml(fullCode)}</pre>
            <button class="btn btn-action" onclick="copyToClipboard()">클립보드 복사</button>
        `;
        modal.style.display = 'flex';
    }

    function viewImage(url) {
        const modal = document.getElementById('modal');
        const body = document.getElementById('modal-body');
        body.innerHTML = `<img src="${url}" style="width:100%; border-radius:8px;">`;
        modal.style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
    }

    function copyToClipboard() {
        const code = document.getElementById('code-block').innerText;
        navigator.clipboard.writeText(code).then(() => alert('코드가 복사되었습니다!'));
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    loadLibrary();
</script>
</body>
</html>
