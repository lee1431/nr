<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>STANCE | Project Collection</title>
    
    <meta name="description" content="STANCE의 프로젝트 아카이브. URL QR 변환, 게임, 갤러리 등 다양한 웹 애플리케이션 컬렉션입니다.">
    <meta name="keywords" content="STANCE, 프로젝트, 포트폴리오, 개발자, 아카이브, 웹앱, 픽셀아트">
    <meta name="author" content="STANCE">
    <link rel="canonical" href="./">

    <meta property="og:type" content="website">
    <meta property="og:url" content="./">
    <meta property="og:title" content="STANCE ARCHIVE">
    <meta property="og:description" content="STANCE의 프로젝트 리스트">
    <meta property="og:image" content="./assets/img/img.png">
    <meta property="og:site_name" content="STANCE ARCHIVE">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="STANCE">
    <link rel="apple-touch-icon" href="./assets/img/icon-192.png">

    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#111111" media="(prefers-color-scheme: dark)">

    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

        :root {
            --grid-line: rgba(0, 0, 0, 0.06);
            --accent: #2ecc71;
            --bg-main: #ffffff;
            --text-dark: #1a1a1a;
            --text-light: #888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-main);
            background-image: 
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 25px 25px;
            padding: env(safe-area-inset-top) 20px 60px; /* 상단 안전영역 및 여백 */
            color: var(--text-dark);
            min-height: 100vh;
        }

        header {
            max-width: 1200px;
            margin: 40px auto 50px;
            padding: 0 5px 15px;
            border-bottom: 3px solid var(--text-dark);
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        header h1 {
            font-size: 1.4rem;
            letter-spacing: 0.3em;
            font-weight: 800;
            text-transform: uppercase;
        }

        .stats { font-size: 0.9rem; color: var(--text-light); font-weight: 600; }

        /* 프로젝트 그리드 */
        .archive-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 카드 스타일 */
        .card {
            text-decoration: none;
            color: inherit;
            display: block;
            background: #fff;
            border: 1px solid #ddd;
            position: relative;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.1);
            border-color: var(--text-dark);
            z-index: 5;
        }

        .badge {
            position: absolute;
            top: 10px; left: 10px;
            width: 22px; height: 22px;
            background: var(--accent);
            color: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 700;
            z-index: 10;
        }

        .img-box {
            width: 100%;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            background: #f8f8f8;
            border-bottom: 1px solid #eee;
        }

        .img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            image-rendering: pixelated; /* 픽셀 아트 최적화 */
            transition: transform 0.3s ease;
        }

        .card:hover .img-box img { transform: scale(1.05); }

        .info {
            padding: 12px;
            background: #fff;
            text-align: center;
        }

        .info .title {
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: -0.01em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 다크모드 */
        @media (prefers-color-scheme: dark) {
            :root {
                --grid-line: rgba(255, 255, 255, 0.05);
                --bg-main: #111;
                --text-dark: #eee;
            }
            .card { background: #1a1a1a; border-color: #333; }
            .info { background: #1a1a1a; }
            .img-box { background: #222; border-bottom-color: #333; }
        }

        /* 모바일 대응 */
        @media (max-width: 480px) {
            .archive-container {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 12px;
            }
            header h1 { font-size: 1.1rem; letter-spacing: 0.1em; }
        }
    </style>
</head>
<body>

    </main>

    <script>
        // 프로젝트 개수 자동 업데이트
        document.addEventListener('DOMContentLoaded', () => {
            const count = document.querySelectorAll('.card').length;
            document.getElementById('counter').innerText = `${count} PROJECTS`;
