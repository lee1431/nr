<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STANCE ARCHIVE</title>

<style>
:root{
  --size: 120px;
  --gap: 6px;
  --bg:#ffffff;
  --line:#e9ecef;
  --accent:#123c2f;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
  font-family:Inter, sans-serif;
  background:
    linear-gradient(#f2f4f3 1px, transparent 1px),
    linear-gradient(90deg, #f2f4f3 1px, transparent 1px);
  background-size: 24px 24px;
  background-color:#ffffff;
}

header{
  height:48px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 18px;
  border-bottom:1px solid var(--line);
  font-size:13px;
  letter-spacing:.5px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(var(--size),1fr));
  gap:var(--gap);
  padding:var(--gap);
}

.item{
  aspect-ratio:1/1;
  background:#f4f6f5;
  position:relative;
  overflow:hidden;
  cursor:pointer;
  transition:transform .15s ease;
}

.item:hover{
  transform:scale(1.04);
  z-index:2;
}

.item img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

.item .title{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  background:rgba(0,0,0,.65);
  color:#fff;
  font-size:11px;
  padding:4px 6px;
  opacity:0;
  transition:.2s;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.item:hover .title{
  opacity:1;
}

.item .count{
  position:absolute;
  top:6px;
  left:6px;
  z-index:3;
  min-width:22px;
  height:22px;
  padding:0 7px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  background:rgba(18,60,47,.9);
  color:#fff;
  font-size:11px;
  line-height:1;
  border-radius:999px;
  font-family:ui-monospace, SFMono-Regular, Menlo, monospace;
  pointer-events:none;
}
	
</style>
	
</head>

<body>

<header>
  <div>STANCE ARCHIVE</div>
  <div><span id="project-count">0</span> Projects</div>
</header>

<section class="grid">

  <a href="https://llsshh.com/p/utq.html" class="project-link" target="_blank" rel="noopener noreferrer" data-name="utq">
    <div class="item">
      <div class="count">0</div>
      <img src="./assets/img/utq.png" loading="lazy">
      <div class="title">Url To QR</div>
    </div>
  </a>
  <a href="https://llsshh.com/p/setimg.html" class="project-link" target="_blank" rel="noopener noreferrer" data-name="setimg">
    <div class="item">
      <div class="count">0</div>
      <img src="./assets/img/setimg.png" loading="lazy">
      <div class="title">Get Img</div>
    </div>
  </a>
  <a href="https://llsshh.com/p/messenger.html" class="project-link" target="_blank" rel="noopener noreferrer" data-name="messenger">
    <div class="item">
      <div class="count">0</div>
      <img src="./assets/img/oi.png" loading="lazy">
      <div class="title">MSG</div>
    </div>
  </a>
  <a href="https://llsshh.com/p/event.html" class="project-link" target="_blank" rel="noopener noreferrer" data-name="event">
    <div class="item">
      <div class="count">0</div>
      <img src="./assets/img/event.png" loading="lazy">
      <div class="title">Event</div>
    </div>
  </a>

</section>


<script>
  function updateProjectCounter() {
    const count = document.querySelectorAll(".item").length;
    const el = document.getElementById("project-count");
    if (el) el.textContent = String(count);
  }  
  async function loadProjectCounts() {
    try {
      const res = await fetch("https://mrdindoin.ddns.net/logcnt/counts/list");
      const list = await res.json();  
      const countMap = {};
      list.forEach(item => {
        countMap[item.name] = item.count;
      });  
      document.querySelectorAll(".project-link").forEach(link => {
        const name = link.dataset.name;
        const countEl = link.querySelector(".count");
        if (!countEl || !name) return;
        countEl.textContent = countMap[name] ?? 0;
      });
    } catch (e) {
      console.log("count load fail", e);
    }
  }  
  function bindProjectLogging() {
    document.querySelectorAll(".project-link").forEach(link => {
      link.addEventListener("click", () => {
        const name = link.dataset.name;
        if (!name) return;  
        const rid = `${Date.now()}-${Math.random().toString(36).slice(2, 10)}`;
        const url = `https://mrdindoin.ddns.net/logcnt/log?project=${encodeURIComponent(name)}&rid=${encodeURIComponent(rid)}`;  
        console.log("log send", { name, rid });  
        fetch(url, { method: "GET" }).catch(err => {
          console.error("project log error:", err);
        });
      });
    });
  }
  document.addEventListener("DOMContentLoaded", () => {
    fetch("https://mrdindoin.ddns.net/logcnt/log?project=index").catch(() => {});
    updateProjectCounter();
    loadProjectCounts();
    bindProjectLogging();
    const observer = new MutationObserver(updateProjectCounter);
    observer.observe(document.querySelector(".grid") || document.body, {
      childList: true,
      subtree: true
    });
  });
  window.addEventListener("scroll", () => {
    if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 400) {
      if (typeof loadMore === "function") loadMore();
    }
  });
  
</script>
</body>
</html>
