<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>동전 쌓기 게임</title>

<style>
body {
  margin: 0;
  background: #1a1a1a;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial, sans-serif;
}

#gameContainer {
  position: relative;
}

canvas {
  background: linear-gradient(#87ceeb, #dff6ff);
  border: 3px solid #333;
}

#ui {
  position: absolute;
  top: 10px;
  left: 10px;
  color: white;
  font-size: 24px;
  font-weight: bold;
  text-shadow: 2px 2px 4px black;
}

#message {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: white;
  font-size: 30px;
  font-weight: bold;
  text-align: center;
  text-shadow: 2px 2px 5px black;
  line-height: 1.6;
  user-select: none;
}
</style>
</head>

<body>
<div id="gameContainer">
  <canvas id="game" width="400" height="700"></canvas>
  <div id="ui">점수: <span id="score">0</span></div>
  <div id="message">
    동전 쌓기<br><br>
    클릭 또는 스페이스바 시작
  </div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const scoreEl = document.getElementById("score");
const messageEl = document.getElementById("message");

const coinRadius = 40;

let stack = [];
let movingCoin = null;
let score = 0;
let speed = 3;
let gameStarted = false;
let gameOver = false;

function createMovingCoin() {
  movingCoin = {
    x: coinRadius,
    y: 120,
    r: coinRadius,
    dir: 1
  };
}

function resetGame() {
  score = 0;
  speed = 3;
  gameOver = false;

  stack = [
    {
      x: canvas.width / 2,
      y: canvas.height - 70,
      r: coinRadius
    }
  ];

  createMovingCoin();

  scoreEl.textContent = score;
}

function drawCoin(x, y, r) {
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fillStyle = "#FFD700";
  ctx.fill();

  ctx.lineWidth = 4;
  ctx.strokeStyle = "#CCAA00";
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(x, y, r - 10, 0, Math.PI * 2);
  ctx.lineWidth = 3;
  ctx.strokeStyle = "#FFF2A8";
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(x - 10, y - 10, 8, 0, Math.PI * 2);
  ctx.fillStyle = "rgba(255,255,255,0.35)";
  ctx.fill();
}

function drawGround() {
  ctx.fillStyle = "#6b4f2a";
  ctx.fillRect(0, canvas.height - 30, canvas.width, 30);
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawGround();

  for (const coin of stack) {
    drawCoin(coin.x, coin.y, coin.r);
  }

  if (!gameOver && movingCoin) {
    drawCoin(movingCoin.x, movingCoin.y, movingCoin.r);
  }
}

function update() {
  if (!gameStarted || gameOver || !movingCoin) return;

  movingCoin.x += speed * movingCoin.dir;

  if (movingCoin.x >= canvas.width - coinRadius) {
    movingCoin.x = canvas.width - coinRadius;
    movingCoin.dir = -1;
  }

  if (movingCoin.x <= coinRadius) {
    movingCoin.x = coinRadius;
    movingCoin.dir = 1;
  }
}

function dropCoin() {
  if (!gameStarted) {
    gameStarted = true;
    resetGame();
    messageEl.innerHTML = "";
    return;
  }

  if (gameOver) {
    gameStarted = true;
    resetGame();
    messageEl.innerHTML = "";
    return;
  }

  const topCoin = stack[stack.length - 1];
  const offset = Math.abs(movingCoin.x - topCoin.x);

  if (offset > coinRadius * 0.8) {
    gameOver = true;
    messageEl.innerHTML = `
      게임 오버<br>
      점수: ${score}<br><br>
      클릭하여 재시작
    `;
    return;
  }

  stack.push({
    x: movingCoin.x,
    y: topCoin.y - coinRadius * 1.2,
    r: coinRadius
  });

  score++;
  scoreEl.textContent = score;

  speed += 0.2;

  if (stack[stack.length - 1].y < 170) {
    for (const coin of stack) {
      coin.y += coinRadius * 1.2;
    }
  }

  createMovingCoin();
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

canvas.addEventListener("click", dropCoin);

document.addEventListener("keydown", function(e) {
  if (e.code === "Space") {
    e.preventDefault();
    dropCoin();
  }
});

resetGame();
gameStarted = false;

messageEl.innerHTML = `
  동전 쌓기<br><br>
  클릭 또는 스페이스바 시작
`;

gameLoop();
</script>
</body>
</html>
